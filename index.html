<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0">
    <meta name="theme-color" content="#453C67">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>FinanceHub · Gestão Financeira</title>

    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="vulp+.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* ===== ESTILOS EXATAMENTE COMO ESTAVAM ===== */
        :root {
            --bg: #453C67;
            --card: #3A3159;
            --card-secondary: #4B3F6B;
            --text: #FFFFFF;
            --text-secondary: #C4B8E0;
            --border: rgba(255, 255, 255, 0.08);
            --accent: #6D67E4;
            --accent-hover: #7B73F0;
            --income: #46C2CB;
            --expense: #EF4444;
            --warning: #F2F7A1;
            --info: #3B82F6;
            --radius: 20px;
            --radius-sm: 14px;
            --radius-xs: 10px;
            --transition: 250ms cubic-bezier(0.4, 0, 0.2, 1);
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2), 0 2px 4px -2px rgba(0, 0, 0, 0.2);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 4px 6px -4px rgba(0, 0, 0, 0.2);
            --sidebar-width: 260px;
            --header-height: 64px;
            --bottom-nav-height: 64px;
            --font: 'Inter', system-ui, -apple-system, sans-serif;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        .light-mode {
            --bg: #F8FAFC;
            --card: #FFFFFF;
            --card-secondary: #F1F5F9;
            --text: #0F172A;
            --text-secondary: #64748B;
            --border: rgba(0, 0, 0, 0.06);
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.08), 0 4px 6px -4px rgba(0, 0, 0, 0.04);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            display: flex;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            transition: background var(--transition), color var(--transition);
            -webkit-font-smoothing: antialiased;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
            position: relative;
        }

        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 3px;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; } to { opacity: 1; }
        }

        @keyframes scaleIn {
            from { transform: scale(0.94); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        @keyframes confetti {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-200px) rotate(720deg); opacity: 0; }
        }

        .animate-in {
            animation: fadeInUp 0.5s ease forwards;
            opacity: 0;
        }

        .confetti-piece {
            position: fixed;
            width: 10px;
            height: 10px;
            border-radius: 2px;
            z-index: 9999;
            animation: confetti 1.5s ease-out forwards;
            pointer-events: none;
        }

        .sidebar {
            width: var(--sidebar-width);
            background: var(--card);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            z-index: 100;
            border-right: 1px solid var(--border);
            transition: transform var(--transition), width var(--transition);
            overflow-y: auto;
            overflow-x: hidden;
            position: relative;
        }

        .sidebar .logo {
            padding: 24px 20px 20px;
            font-weight: 600;
            font-size: 1.1em;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: -0.3px;
            flex-shrink: 0;
        }

        .sidebar .logo img {
            height: 44px;
            width: auto;
            filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.3));
            transition: transform 0.3s ease;
            flex-shrink: 0;
        }

        .sidebar nav {
            flex: 1;
            padding: 8px 0;
            overflow-y: auto;
        }

        .sidebar nav a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 20px;
            margin: 2px 8px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.83em;
            font-weight: 500;
            border-radius: 10px;
            transition: all var(--transition);
            cursor: pointer;
            position: relative;
            white-space: nowrap;
            min-height: 44px;
        }

        .sidebar nav a i {
            stroke-width: 1.5;
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        .sidebar nav a:hover {
            background: rgba(255, 255, 255, 0.04);
            color: var(--text);
        }

        .sidebar nav a.active {
            background: rgba(109, 103, 228, 0.15);
            color: var(--accent);
            font-weight: 600;
        }

        .sidebar nav a.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 20px;
            background: var(--accent);
            border-radius: 0 3px 3px 0;
        }

        .sidebar-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            font-size: 0.72em;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .sidebar-footer .theme-toggle {
            cursor: pointer;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            transition: all var(--transition);
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: 149;
            animation: fadeIn 0.25s ease;
            backdrop-filter: blur(2px);
        }

        .sidebar-overlay.visible {
            display: block;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg);
            min-width: 0;
            position: relative;
        }

        .header {
            height: var(--header-height);
            min-height: var(--header-height);
            background: var(--card);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 50;
            gap: 10px;
            flex-shrink: 0;
        }

        .header h2 {
            font-size: 1.1em;
            font-weight: 600;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .header-actions {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-shrink: 0;
        }

        .hamburger-btn {
            display: none;
            width: 40px;
            height: 40px;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            border: none;
            background: transparent;
            color: var(--text);
            cursor: pointer;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 20px;
            transition: opacity 0.3s ease, transform 0.3s ease;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-y: contain;
        }

        .bottom-nav {
            display: none;
            height: var(--bottom-nav-height);
            background: var(--card);
            border-top: 1px solid var(--border);
            z-index: 120;
            flex-shrink: 0;
            padding: 0 8px;
            padding-bottom: var(--safe-bottom);
            align-items: center;
            justify-content: space-around;
        }

        .bottom-nav button {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 6px 4px;
            border-radius: 10px;
            transition: all var(--transition);
            font-family: var(--font);
            font-size: 0.65em;
            font-weight: 500;
            min-height: 48px;
        }

        .bottom-nav button i {
            width: 22px;
            height: 22px;
            stroke-width: 1.8;
        }

        .bottom-nav button.active {
            color: var(--accent);
            font-weight: 600;
        }

        .bottom-nav button.fab-btn {
            position: relative;
            top: -16px;
            background: var(--accent);
            color: #fff;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            flex: 0 0 48px;
            box-shadow: 0 4px 15px rgba(109, 103, 228, 0.4);
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0;
        }

        .bottom-nav button.fab-btn i {
            width: 24px;
            height: 24px;
            color: #fff;
        }

        .grid-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 14px;
            margin-bottom: 20px;
        }

        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 18px 20px;
            border: 1px solid var(--border);
            transition: all var(--transition);
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: var(--shadow);
            transform: translateY(-2px);
        }

        .card-label {
            font-size: 0.7em;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .card-value {
            font-size: 1.5em;
            font-weight: 700;
            letter-spacing: -0.5px;
            line-height: 1.1;
        }

        .income-text { color: var(--income); }
        .expense-text { color: var(--expense); }

        .btn {
            padding: 9px 16px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.8em;
            transition: all var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: var(--font);
            letter-spacing: 0.2px;
            background: transparent;
            color: var(--text);
            white-space: nowrap;
            min-height: 40px;
            position: relative;
            overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 5px;
            height: 5px;
            background: rgba(255, 255, 255, 0.3);
            opacity: 0;
            border-radius: 100%;
            transform: scale(1, 1) translate(-50%, -50%);
            transform-origin: 50% 50%;
        }

        .btn:active::after {
            animation: ripple 0.6s ease-out;
        }

        @keyframes ripple {
            to { opacity: 0; transform: scale(20, 20) translate(-50%, -50%); }
        }

        .btn-primary {
            background: var(--accent);
            color: #FFFFFF;
            font-weight: 600;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(109, 103, 228, 0.3);
        }

        .btn-danger {
            background: transparent;
            color: var(--expense);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .btn-danger:hover { background: rgba(239, 68, 68, 0.1); }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
        }

        .btn-outline:hover { border-color: var(--accent); color: var(--accent); }

        .btn-sm { padding: 5px 12px; font-size: 0.72em; min-height: 34px; }

        .transaction-list { display: flex; flex-direction: column; gap: 6px; }

        .transaction-item {
            display: flex;
            align-items: center;
            padding: 12px 14px;
            background: var(--card);
            border-radius: var(--radius-sm);
            border: 1px solid transparent;
            transition: all var(--transition);
            gap: 10px;
            flex-wrap: wrap;
        }

        .transaction-item:hover { border-color: var(--border); background: var(--card-secondary); }

        .transaction-icon {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            background: var(--card-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.8em;
            flex-shrink: 0;
        }

        .transaction-info { flex: 1; min-width: 0; }

        .transaction-info .category { font-weight: 600; font-size: 0.83em; }

        .transaction-info .meta { font-size: 0.7em; color: var(--text-secondary); margin-top: 2px; }

        .transaction-amount { font-weight: 700; font-size: 0.85em; white-space: nowrap; flex-shrink: 0; }

        .transaction-amount.positive { color: var(--income); }

        .transaction-amount.negative { color: var(--expense); }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease;
            padding: 20px;
        }

        .modal {
            background: var(--card);
            border-radius: var(--radius);
            padding: 28px 24px;
            width: 100%;
            max-width: 500px;
            max-height: 85vh;
            max-height: 85dvh;
            overflow-y: auto;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-lg);
            animation: scaleIn 0.2s ease;
        }

        .modal h3 { font-size: 1.05em; font-weight: 600; margin-bottom: 20px; }

        .form-group { margin-bottom: 16px; }

        .form-group label { display: block; font-weight: 500; font-size: 0.72em; margin-bottom: 5px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            height: 46px;
            padding: 0 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 0.85em;
            background: var(--card-secondary);
            color: var(--text);
            font-family: var(--font);
            transition: all var(--transition);
            appearance: none;
        }

        .form-group textarea { height: auto; padding: 10px 14px; resize: vertical; }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(109, 103, 228, 0.15);
        }

        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 24px; flex-wrap: wrap; }

        .row-flex { display: flex; gap: 12px; }
        .row-flex > * { flex: 1; min-width: 0; }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 12px 20px;
            border-radius: 50px;
            z-index: 999;
            font-weight: 500;
            font-size: 0.78em;
            animation: slideUp 0.3s ease;
            box-shadow: var(--shadow-lg);
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
            max-width: 90vw;
            transition: opacity 0.3s, transform 0.3s;
        }

        .toast.success { border-left: 3px solid var(--income); }
        .toast.error { border-left: 3px solid var(--expense); }
        .toast.warning { border-left: 3px solid var(--warning); }

        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            background: var(--bg);
            padding: 20px;
        }

        .login-box {
            background: var(--card);
            padding: 40px 32px;
            border-radius: var(--radius);
            width: 400px;
            max-width: 100%;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-lg);
            text-align: center;
        }

        .login-box .login-logo { height: 72px; margin-bottom: 16px; }

        .login-box input {
            width: 100%;
            height: 50px;
            padding: 0 16px;
            margin: 10px 0;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 1em;
            text-align: center;
            letter-spacing: 4px;
            font-weight: 500;
            background: var(--card-secondary);
            color: var(--text);
        }

        .progress-bar { height: 4px; background: var(--border); border-radius: 10px; overflow: hidden; margin-top: 6px; }

        .progress-bar .fill { height: 100%; border-radius: 10px; transition: width 0.6s ease; }

        .fill.accent { background: var(--accent); }
        .fill.green { background: var(--income); }
        .fill.red { background: var(--expense); }

        .settings-card input,
        .settings-card select,
        .settings-card textarea {
            height: 46px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--card-secondary);
            color: var(--text);
            padding: 0 14px;
            font-family: var(--font);
            font-size: 0.85em;
            width: 100%;
        }

        .settings-card textarea { height: 70px; padding: 10px 14px; }

        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; text-align: center; font-size: 0.8em; }

        .calendar-grid .day {
            padding: 10px 4px;
            border-radius: 8px;
            cursor: pointer;
            min-height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 500;
            position: relative;
        }

        .calendar-grid .day.header {
            font-weight: 700;
            color: var(--text-secondary);
            font-size: 0.7em;
            cursor: default;
            pointer-events: none;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .calendar-grid .day.today {
            background: var(--accent);
            color: #fff;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            margin: auto;
        }

        .calendar-grid .day.has-event::after {
            content: '';
            position: absolute;
            bottom: 3px;
            left: 50%;
            transform: translateX(-50%);
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--accent);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.68em;
            font-weight: 600;
            white-space: nowrap;
        }

        /* LISTA DE COMPRAS */
        .shopping-category {
            margin-bottom: 20px;
            border-radius: var(--radius-sm);
            overflow: hidden;
            background: var(--card);
            border: 1px solid var(--border);
        }

        .shopping-category-header {
            padding: 12px 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--card-secondary);
            font-weight: 600;
            font-size: 0.85em;
            user-select: none;
            transition: background var(--transition);
        }

        .shopping-category-header:hover { background: rgba(109, 103, 228, 0.1); }

        .shopping-category-header .arrow { transition: transform 0.3s ease; }

        .shopping-category-header .arrow.open { transform: rotate(180deg); }

        .shopping-items { padding: 4px 0; }

        .shopping-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;
            cursor: pointer;
            transition: all var(--transition);
            border-bottom: 1px solid var(--border);
        }

        .shopping-item:last-child { border-bottom: none; }

        .shopping-item:hover { background: rgba(255, 255, 255, 0.02); }

        .shopping-item input[type="checkbox"] { width: 20px; height: 20px; accent-color: var(--accent); cursor: pointer; flex-shrink: 0; }

        .shopping-item .item-name { flex: 1; font-size: 0.83em; transition: all var(--transition); }

        .shopping-item.checked .item-name { text-decoration: line-through; opacity: 0.5; }

        .shopping-item .delete-item-btn {
            opacity: 0;
            transition: opacity var(--transition);
            cursor: pointer;
            background: none;
            border: none;
            color: var(--expense);
            padding: 4px;
            display: flex;
            align-items: center;
        }

        .shopping-item:hover .delete-item-btn { opacity: 1; }

        /* PLANEJAMENTO (NOVO) */
        .plan-group { margin-bottom: 24px; }

        .plan-group-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 14px;
            background: var(--card-secondary);
            border-radius: var(--radius-sm);
            font-weight: 600;
            font-size: 0.9em;
            margin-bottom: 8px;
            flex-wrap: wrap;
            gap: 8px;
        }

        .plan-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            background: var(--card);
            border-radius: var(--radius-xs);
            margin-bottom: 4px;
            border: 1px solid transparent;
            transition: all var(--transition);
            flex-wrap: wrap;
        }

        .plan-item:hover { border-color: var(--border); background: var(--card-secondary); }

        .plan-item .plan-desc { flex: 1; min-width: 0; font-size: 0.83em; }

        .plan-item .plan-amount { font-weight: 600; font-size: 0.85em; white-space: nowrap; }

        .plan-item .plan-status { font-size: 0.7em; min-width: 70px; }

        /* RESPONSIVE */
        @media (min-width: 768px) and (max-width: 1023px) {
            :root { --sidebar-width: 60px; }
            .sidebar .logo { justify-content: center; font-size: 0; padding: 20px 8px; }
            .sidebar .logo img { height: 32px; }
            .sidebar nav a { justify-content: center; padding: 12px; font-size: 0; gap: 0; margin: 2px 4px; }
            .sidebar nav a i { margin: 0 auto; }
            .sidebar nav a.active::before { display: none; }
            .sidebar-footer { justify-content: center; font-size: 0; padding: 12px 8px; }
            .sidebar-footer span { display: none; }
            .grid-cards { grid-template-columns: repeat(2, 1fr); }
            .content { padding: 16px; }
            .header { padding: 0 16px; }
        }

        @media (max-width: 767px) {
            :root { --sidebar-width: 280px; --header-height: 56px; --bottom-nav-height: 60px; }
            body { flex-direction: column; }
            .sidebar { position: fixed; top: 0; left: 0; bottom: 0; width: var(--sidebar-width); max-width: 85vw; z-index: 160; transform: translateX(-100%); box-shadow: var(--shadow-lg); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
            .sidebar.drawer-open { transform: translateX(0); }
            .sidebar-overlay { z-index: 150; }
            .sidebar .logo { padding: 20px 18px; font-size: 1em; }
            .sidebar .logo img { height: 38px; }
            .sidebar nav a { font-size: 0.85em; padding: 12px 18px; margin: 2px 6px; }
            .sidebar-footer { padding: 14px 18px; font-size: 0.75em; }
            .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; width: 100%; padding-bottom: 0; }
            .header { height: var(--header-height); min-height: var(--header-height); padding: 0 12px; gap: 8px; }
            .hamburger-btn { display: flex; }
            .content { padding: 12px; padding-bottom: calc(var(--bottom-nav-height) + var(--safe-bottom) + 12px); }
            .bottom-nav { display: flex; position: fixed; bottom: 0; left: 0; right: 0; z-index: 120; }
            .grid-cards { grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 14px; }
            .card { padding: 14px 16px; border-radius: var(--radius-sm); }
            .card-value { font-size: 1.2em; }
            .dashboard-two-col { flex-direction: column !important; gap: 14px !important; }
            .dashboard-two-col>* { width: 100% !important; }
            .modal-overlay { padding: 10px; align-items: flex-end; }
            .modal { max-width: 100%; border-radius: var(--radius) var(--radius) 0 0; max-height: 90vh; padding: 22px 16px; }
            .row-flex { flex-direction: column; gap: 0; }
            .transaction-item { padding: 10px 12px; gap: 8px; }
            .transaction-icon { width: 34px; height: 34px; }
            .toast { bottom: calc(var(--bottom-nav-height) + var(--safe-bottom) + 12px); right: 12px; left: 12px; max-width: none; border-radius: 16px; }
            .btn { min-height: 42px; }
            .btn-sm { min-height: 36px; }
            .shopping-item:hover .delete-item-btn { opacity: 1; }
        }

        @media (max-width: 379px) {
            .grid-cards { grid-template-columns: 1fr; }
            .card-value { font-size: 1.1em; }
            .bottom-nav button { font-size: 0.6em; }
            .bottom-nav button i { width: 18px; height: 18px; }
            .bottom-nav button.fab-btn { width: 40px; height: 40px; flex: 0 0 40px; top: -12px; }
        }

        @media (min-width: 1400px) {
            .content { padding: 32px 40px; }
            .grid-cards { grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; }
            .card { padding: 24px 28px; }
            .card-value { font-size: 1.8em; }
        }
    </style>
</head>
<body>

    <div id="loginScreen" class="login-container">
        <div class="login-box">
            <img src="https://res.cloudinary.com/duu9q94cf/image/upload/quero-que-voc%C3%AA-crie-uma-logo--para-o-aplicativo-we_uzwrya.png" alt="FinanceHub Logo" class="login-logo">
            <h1>Finance<span style="color:var(--accent);">Hub</span></h1>
            <p style="color:var(--text-secondary); margin-bottom:20px;">Gestão financeira inteligente</p>
            <input type="password" id="loginPin" placeholder="Senha de acesso" maxlength="6" autofocus inputmode="numeric" pattern="[0-9]*">
            <button class="btn btn-primary" onclick="doLogin()" style="width:100%;height:48px;justify-content:center;margin-top:8px;">Entrar</button>
            <p style="font-size:0.7em;color:var(--text-secondary);margin-top:16px;">Senha padrão: <strong style="color:var(--text);">1234</strong></p>

    </div>

    <div id="appScreen" style="display:none;width:100%;height:100vh;height:100dvh;">
        <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
        <aside class="sidebar" id="sidebar">
            <div class="logo"><img src="https://res.cloudinary.com/duu9q94cf/image/upload/quero-que-voc%C3%AA-crie-uma-logo--para-o-aplicativo-we_uzwrya.png" alt="FinanceHub"><span>FinanceHub</span></div>
            <nav>
                <a onclick="navigate('dashboard')" class="active" data-nav="dashboard"><i data-lucide="layout-dashboard"></i> Dashboard</a>
                <a onclick="navigate('receitas')" data-nav="receitas"><i data-lucide="arrow-down-circle"></i> Receitas</a>
                <a onclick="navigate('despesas')" data-nav="despesas"><i data-lucide="arrow-up-circle"></i> Despesas</a>
                <a onclick="navigate('contas')" data-nav="contas"><i data-lucide="landmark"></i> Contas</a>
                <a onclick="navigate('cartoes')" data-nav="cartoes"><i data-lucide="credit-card"></i> Cartões</a>
                <a onclick="navigate('contasPagar')" data-nav="contasPagar"><i data-lucide="file-text"></i> Contas a Pagar</a>
                <a onclick="navigate('transferencias')" data-nav="transferencias"><i data-lucide="arrow-left-right"></i> Transferências</a>
                <a onclick="navigate('planejamento')" data-nav="planejamento"><i data-lucide="clipboard-list"></i> Planejamento</a>
                <a onclick="navigate('orcamento')" data-nav="orcamento"><i data-lucide="target"></i> Orçamento</a>
                <a onclick="navigate('metas')" data-nav="metas"><i data-lucide="flag"></i> Metas</a>
                <a onclick="navigate('calendario')" data-nav="calendario"><i data-lucide="calendar"></i> Calendário</a>
                <a onclick="navigate('listaCompras')" data-nav="listaCompras"><i data-lucide="shopping-cart"></i> Lista de Compras</a>
                <a onclick="navigate('relatorios')" data-nav="relatorios"><i data-lucide="bar-chart-3"></i> Relatórios</a>
                <a onclick="navigate('configuracoes')" data-nav="configuracoes"><i data-lucide="settings"></i> Configurações</a>
            </nav>
            <div class="sidebar-footer">
                <span>v2.9 · Planilha</span>
                <button class="theme-toggle" onclick="toggleTheme()"><i data-lucide="sun-moon" style="width:18px;height:18px;"></i></button>
            </div>
        </aside>

        <div class="main">
            <header class="header">
                <button class="hamburger-btn" id="hamburgerBtn" onclick="toggleSidebar()"><i data-lucide="menu"></i></button>
                <h2 id="pageTitle">Visão Geral</h2>
                <div class="header-actions">
                    <button class="btn btn-outline btn-sm" onclick="navigate('configuracoes')"><i data-lucide="settings" style="width:14px;"></i></button>
                    <button class="btn btn-danger btn-sm" onclick="doLogout()">Sair</button>
                </div>
            </header>
            <div class="content" id="contentArea"></div>
        </div>

        <nav class="bottom-nav" id="bottomNav">
            <button onclick="navigate('dashboard')" data-bnav="dashboard" class="active"><i data-lucide="layout-dashboard"></i><span>Início</span></button>
            <button onclick="navigate('receitas')" data-bnav="receitas"><i data-lucide="arrow-down-circle"></i><span>Receitas</span></button>
            <button class="fab-btn" onclick="openQuickAddMenu()"><i data-lucide="plus"></i></button>
            <button onclick="navigate('despesas')" data-bnav="despesas"><i data-lucide="arrow-up-circle"></i><span>Despesas</span></button>
            <button onclick="navigate('listaCompras')" data-bnav="listaCompras"><i data-lucide="shopping-cart"></i><span>Compras</span></button>
        </nav>
    </div>

    <div id="toastContainer"></div>
    <div id="modalContainer"></div>

    <script>
        // ==================== STATE ====================
        const DEFAULT_PIN = '1234';

        const DEFAULT_SHOPPING_LISTS = [{
            id: 'default_shopping',
            name: 'Compras do Mês',
            createdAt: new Date().toISOString(),
            categories: [
                { name: '🥩 Carnes e Proteínas', items: ['Carne bovina', 'Frango', 'Peixe', 'Linguiça', 'Ovos', 'Presunto', 'Queijo', 'Atum em lata', 'Sardinha em lata'], checked: [] },
                { name: '🥛 Laticínios', items: ['Leite', 'Iogurte', 'Manteiga', 'Margarina', 'Requeijão', 'Creme de leite', 'Leite condensado'], checked: [] },
                { name: '🍞 Padaria', items: ['Pão francês', 'Pão de forma', 'Torradas', 'Biscoito salgado', 'Biscoito doce', 'Bolacha recheada'], checked: [] },
                { name: '🌾 Grãos e Cereais', items: ['Arroz', 'Feijão', 'Macarrão', 'Farinha de trigo', 'Farinha de mandioca', 'Fubá', 'Aveia', 'Milho para pipoca'], checked: [] },
                { name: '🥫 Enlatados e Conservas', items: ['Milho verde', 'Ervilha', 'Molho de tomate', 'Extrato de tomate', 'Azeitona', 'Palmito'], checked: [] },
                { name: '🥬 Hortifruti', items: ['Alface', 'Tomate', 'Cebola', 'Alho', 'Batata', 'Cenoura', 'Pimentão', 'Pepino', 'Couve', 'Brócolis', 'Banana', 'Maçã', 'Laranja', 'Mamão', 'Limão', 'Abacaxi'], checked: [] },
                { name: '🧂 Temperos e Condimentos', items: ['Sal', 'Açúcar', 'Café', 'Óleo de soja', 'Azeite', 'Vinagre', 'Pimenta-do-reino', 'Orégano', 'Colorau', 'Cominho', 'Caldo de carne', 'Caldo de galinha'], checked: [] },
                { name: '🍬 Doces e Sobremesas', items: ['Chocolate', 'Gelatina', 'Pudim', 'Achocolatado', 'Doce de leite'], checked: [] },
                { name: '🥤 Bebidas', items: ['Água mineral', 'Refrigerante', 'Suco', 'Chá', 'Café', 'Água de coco'], checked: [] },
                { name: '🧼 Limpeza', items: ['Detergente', 'Sabão em pó', 'Sabão em barra', 'Amaciante', 'Água sanitária', 'Desinfetante', 'Limpador multiuso', 'Esponja', 'Palha de aço', 'Saco de lixo', 'Papel toalha'], checked: [] },
                { name: '🧴 Higiene Pessoal', items: ['Papel higiênico', 'Creme dental', 'Escova de dentes', 'Sabonete', 'Shampoo', 'Condicionador', 'Desodorante', 'Fio dental', 'Cotonetes', 'Algodão', 'Absorvente', 'Aparelho de barbear'], checked: [] },
                { name: '🐶 Pet', items: ['Ração', 'Petiscos', 'Areia para gato', 'Shampoo para pet'], checked: [] },
                { name: '👶 Bebê', items: ['Fraldas', 'Lenço umedecido', 'Pomada para assaduras', 'Fórmula infantil'], checked: [] },
                { name: '🏠 Utilidades Domésticas', items: ['Papel alumínio', 'Filme plástico', 'Guardanapo', 'Fósforos', 'Velas', 'Pilhas', 'Filtro de café'], checked: [] }
            ]
        }];

        let appState = {
            pin: DEFAULT_PIN,
            darkMode: true,
            accounts: [],
            transactions: [],
            creditCards: [],
            bills: [],
            budgets: [],
            goals: [],
            transfers: [],
            dailyLimits: { weekday: 0, saturday: 0, sunday: 0 },
            monthlyBudget: 0,
            shoppingLists: JSON.parse(JSON.stringify(DEFAULT_SHOPPING_LISTS)),
            customCategories: {
                expense: ['Moradia', 'Alimentação', 'Transporte', 'Saúde', 'Educação', 'Lazer', 'Compras', 'Assinaturas', 'Pets', 'Impostos', 'Outros'],
                income: ['Salário', 'Freelance', 'Comissão', 'Venda', 'Presente', 'Outros']
            },
            plans: [],
            sheetApiUrl: '' // NOVO: URL da API da planilha (Google Apps Script / webhook)
        };

        function saveState() {
            localStorage.setItem('financehub_data', JSON.stringify(appState));
            // NOVO: Tentar sincronizar com planilha automaticamente
            syncToSheet();
        }

        // NOVO: Sincronização com planilha via API configurável
        function syncToSheet() {
            const url = appState.sheetApiUrl;
            if (!url || typeof fetch === 'undefined') return;
            try {
                // Envia de forma assíncrona, sem bloquear a interface
                fetch(url, {
                    method: 'POST',
                    mode: 'no-cors', // Permite envio mesmo sem CORS configurado (Google Apps Script geralmente aceita)
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        timestamp: new Date().toISOString(),
                        accounts: appState.accounts,
                        transactions: appState.transactions,
                        creditCards: appState.creditCards,
                        bills: appState.bills,
                        budgets: appState.budgets,
                        goals: appState.goals,
                        transfers: appState.transfers,
                        dailyLimits: appState.dailyLimits,
                        monthlyBudget: appState.monthlyBudget,
                        plans: appState.plans
                    })
                }).catch(() => {
                    // Silencioso: a planilha pode estar offline, os dados permanecem no localStorage
                });
            } catch (e) {
                // Ignora erros de sincronização
            }
        }

        function loadState() {
            const saved = localStorage.getItem('financehub_data');
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    appState = { ...appState, ...parsed };
                    if (!appState.customCategories) appState.customCategories = {
                        expense: ['Moradia', 'Alimentação', 'Transporte', 'Saúde', 'Educação', 'Lazer', 'Compras', 'Assinaturas', 'Pets', 'Impostos', 'Outros'],
                        income: ['Salário', 'Freelance', 'Comissão', 'Venda', 'Presente', 'Outros']
                    };
                    if (!appState.transfers) appState.transfers = [];
                    if (!appState.budgets) appState.budgets = [];
                    if (!appState.goals) appState.goals = [];
                    if (!appState.dailyLimits) appState.dailyLimits = { weekday: 0, saturday: 0, sunday: 0 };
                    if (appState.monthlyBudget === undefined) appState.monthlyBudget = 0;
                    if (!appState.shoppingLists || appState.shoppingLists.length === 0) {
                        appState.shoppingLists = JSON.parse(JSON.stringify(DEFAULT_SHOPPING_LISTS));
                    }
                    if (!appState.plans) appState.plans = [];
                    if (appState.sheetApiUrl === undefined) appState.sheetApiUrl = '';
                    appState.shoppingLists.forEach(list => {
                        list.categories.forEach(cat => { if (!cat.checked) cat.checked = []; });
                    });
                } catch (e) { console.warn("Erro ao carregar dados."); }
            }
        }

        function generateId() { return 'id_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6); }
        function formatMoney(val) { return 'R$ ' + Number(val).toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g, '.'); }
        function formatDate(d) { if (!d) return ''; return new Date(d + 'T00:00:00').toLocaleDateString('pt-BR', { timeZone: 'UTC' }); }
        function getMonthRange() { const n = new Date(); const s = new Date(n.getFullYear(), n.getMonth(), 1); const e = new Date(n.getFullYear(), n.getMonth() + 1, 0); return { start: s.toISOString().split('T')[0], end: e.toISOString().split('T')[0] }; }
        function getTodayDate() { return new Date().toISOString().split('T')[0]; }
        function getDayType(d) { const day = new Date(d + 'T00:00:00').getDay(); if (day === 0) return 'sunday'; if (day === 6) return 'saturday'; return 'weekday'; }
        function getDailyLimit() { return appState.dailyLimits[getDayType(getTodayDate())] || 0; }

        function getTodayExpenses() {
            return appState.transactions.filter(t => t.type === 'expense' && t.date === getTodayDate() && t.status !== 'cancelled' && !t.excludeFromDailyLimit)
                .reduce((s, t) => s + Number(t.amount), 0);
        }

        function getAccountName(id) { const a = appState.accounts.find(x => x.id === id); return a ? a.name : '—'; }
        function isMobile() { return window.innerWidth < 768; }

        function getWeekRange() {
            const today = new Date();
            const start = new Date(today);
            start.setDate(today.getDate() - 6);
            const dates = [];
            for (let d = new Date(start); d <= today; d.setDate(d.getDate() + 1)) {
                dates.push(new Date(d).toISOString().split('T')[0]);
            }
            return dates;
        }

        function getWeeklyExpenses() {
            const weekDays = getWeekRange();
            return appState.transactions.filter(t => t.type === 'expense' && weekDays.includes(t.date) && t.status !== 'cancelled' && !t.excludeFromDailyLimit)
                .reduce((s, t) => s + Number(t.amount), 0);
        }

        function getWeeklyLimit() {
            const weekDays = getWeekRange();
            return weekDays.reduce((sum, d) => sum + (appState.dailyLimits[getDayType(d)] || 0), 0);
        }

        function showToast(msg, type = '') {
            const c = document.getElementById('toastContainer');
            const t = document.createElement('div');
            t.className = 'toast ' + type;
            t.textContent = msg;
            c.appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateY(20px)'; setTimeout(() => t.remove(), 300); }, 2500);
        }

        function celebrate() {
            const colors = ['#46C2CB', '#6D67E4', '#F2F7A1', '#EF4444', '#FFFFFF'];
            for (let i = 0; i < 30; i++) {
                const piece = document.createElement('div');
                piece.className = 'confetti-piece';
                piece.style.left = Math.random() * 100 + '%';
                piece.style.top = Math.random() * 50 + '%';
                piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                piece.style.animationDuration = (Math.random() * 1.5 + 1) + 's';
                document.body.appendChild(piece);
                setTimeout(() => piece.remove(), 2500);
            }
            showToast('🎉 Parabéns! Dentro do limite!', 'success');
        }

        function openModal(title, bodyHtml, onSave) {
            document.getElementById('modalContainer').innerHTML = `
            <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
              <div class="modal"><h3>${title}</h3><div id="modalBody">${bodyHtml}</div>
                <div class="modal-actions"><button class="btn btn-outline" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" id="modalSaveBtn">Salvar</button></div>
              </div></div>`;
            document.getElementById('modalSaveBtn').addEventListener('click', () => { if (onSave) onSave(); });
            lucide.createIcons();
            const modalEl = document.querySelector('.modal');
            if (modalEl) modalEl.scrollTop = 0;
        }

        function closeModal() { document.getElementById('modalContainer').innerHTML = ''; }
        function confirmDialog(msg, cb) { if (confirm(msg)) cb(); }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            if (sidebar.classList.contains('drawer-open')) { closeSidebar(); } else { sidebar.classList.add('drawer-open'); overlay.classList.add('visible'); document.body.style.overflow = 'hidden'; }
        }

        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('drawer-open');
            document.getElementById('sidebarOverlay').classList.remove('visible');
            document.body.style.overflow = '';
        }

        function openQuickAddMenu() {
            if (isMobile()) {
                const body = `
                <div style="text-align:center;padding:10px 0;">
                  <p style="margin-bottom:16px;">O que deseja adicionar?</p>
                  <button class="btn btn-primary" style="width:100%;margin-bottom:8px;" id="quickAddExpense"><i data-lucide="arrow-up-circle"></i> Nova Despesa</button>
                  <button class="btn btn-outline" style="width:100%;border-color:var(--income);color:var(--income);" id="quickAddIncome"><i data-lucide="arrow-down-circle"></i> Nova Receita</button>
                </div>`;
                openModal('Adicionar Rápido', body, () => closeModal());
                setTimeout(() => {
                    document.getElementById('quickAddExpense')?.addEventListener('click', () => { closeModal(); openTransactionModal('expense'); });
                    document.getElementById('quickAddIncome')?.addEventListener('click', () => { closeModal(); openTransactionModal('income'); });
                    lucide.createIcons();
                }, 100);
            } else openTransactionModal('expense');
        }

        function toggleTheme() {
            appState.darkMode = !appState.darkMode;
            document.body.classList.toggle('light-mode', !appState.darkMode);
            saveState();
            showToast('Tema atualizado');
            const meta = document.querySelector('meta[name="theme-color"]');
            if (meta) meta.content = appState.darkMode ? '#453C67' : '#F8FAFC';
            if (currentSection === 'dashboard' || currentSection === 'relatorios') setTimeout(renderCharts, 300);
        }

        // ==================== NAVIGATION ====================
        let currentSection = 'dashboard';

        function navigate(section) {
            currentSection = section;
            if (isMobile()) closeSidebar();
            document.querySelectorAll('.sidebar nav a').forEach(a => a.classList.remove('active'));
            document.querySelector(`[data-nav="${section}"]`)?.classList.add('active');
            document.querySelectorAll('.bottom-nav button[data-bnav]').forEach(b => b.classList.remove('active'));
            document.querySelector(`[data-bnav="${section}"]`)?.classList.add('active');
            const titles = {
                dashboard: 'Visão Geral', receitas: 'Receitas', despesas: 'Despesas', contas: 'Contas',
                cartoes: 'Cartões', contasPagar: 'Contas a Pagar', transferencias: 'Transferências',
                orcamento: 'Orçamento', metas: 'Metas', calendario: 'Calendário',
                listaCompras: 'Lista de Compras', relatorios: 'Relatórios', configuracoes: 'Configurações',
                planejamento: 'Planejamento'
            };
            document.getElementById('pageTitle').textContent = titles[section] || section;
            renderSection(section);
            lucide.createIcons();
            if (section === 'dashboard' || section === 'relatorios') setTimeout(renderCharts, 400);
            document.getElementById('contentArea').scrollTop = 0;
        }

        function renderSection(section) {
            const content = document.getElementById('contentArea');
            content.style.opacity = '0';
            content.style.transform = 'translateY(12px)';
            let html = '';
            switch (section) {
                case 'dashboard': html = renderDashboard(); break;
                case 'receitas': html = renderTransactionList('income'); break;
                case 'despesas': html = renderTransactionList('expense'); break;
                case 'contas': html = renderAccounts(); break;
                case 'cartoes': html = renderCreditCards(); break;
                case 'contasPagar': html = renderBills(); break;
                case 'transferencias': html = renderTransfers(); break;
                case 'planejamento': html = renderPlanejamento(); break;
                case 'orcamento': html = renderBudget(); break;
                case 'metas': html = renderGoals(); break;
                case 'calendario': html = renderCalendar(); break;
                case 'listaCompras': html = renderShoppingLists(); break;
                case 'relatorios': html = renderReports(); break;
                case 'configuracoes': html = renderSettings(); break;
                default: html = renderDashboard();
            }
            content.innerHTML = html;
            lucide.createIcons();
            requestAnimationFrame(() => {
                content.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
                content.style.opacity = '1';
                content.style.transform = 'translateY(0)';
                content.querySelectorAll('.card, .transaction-item, .shopping-category, .plan-item').forEach((el, i) => {
                    el.classList.add('animate-in');
                    el.style.animationDelay = `${i * 0.02}s`;
                });
            });
        }

        // ==================== DASHBOARD ====================
        function renderDashboard() {
            const range = getMonthRange();
            const monthTrans = appState.transactions.filter(t => t.date >= range.start && t.date <= range.end && t.status !== 'cancelled');
            const totalIncome = monthTrans.filter(t => t.type === 'income').reduce((s, t) => s + Number(t.amount), 0);
            const totalExpense = monthTrans.filter(t => t.type === 'expense').reduce((s, t) => s + Number(t.amount), 0);
            const balance = totalIncome - totalExpense;
            const totalBalance = appState.accounts.reduce((s, a) => s + Number(a.currentBalance || 0), 0);
            const recent = [...appState.transactions].sort((a, b) => b.date.localeCompare(a.date)).slice(0, 6);
            const todayExp = getTodayExpenses();
            const dailyLimit = getDailyLimit();
            const limitPct = dailyLimit > 0 ? Math.min(100, (todayExp / dailyLimit) * 100) : 0;
            const dayLabel = { weekday: 'Semana', saturday: 'Sábado', sunday: 'Domingo' }[getDayType(getTodayDate())];
            const weeklyExp = getWeeklyExpenses();
            const weeklyLimit = getWeeklyLimit();
            const weeklyPct = weeklyLimit > 0 ? Math.min(100, (weeklyExp / weeklyLimit) * 100) : 0;
            const monthlyBudget = appState.monthlyBudget || 0;
            const monthlyPct = monthlyBudget > 0 ? Math.min(100, (totalExpense / monthlyBudget) * 100) : 0;
            const expenseByCat = {};
            monthTrans.filter(t => t.type === 'expense').forEach(t => expenseByCat[t.category] = (expenseByCat[t.category] || 0) + Number(t.amount));
            const topCats = Object.entries(expenseByCat).sort((a, b) => b[1] - a[1]).slice(0, 6);
            if (dailyLimit > 0 && todayExp < dailyLimit) setTimeout(celebrate, 500);
            return `
            <div class="grid-cards">
              <div class="card"><div class="card-label"><i data-lucide="wallet" style="width:14px;"></i> Saldo total</div><div class="card-value">${formatMoney(totalBalance)}</div></div>
              <div class="card"><div class="card-label"><i data-lucide="arrow-down-circle" style="width:14px;"></i> Receitas do mês</div><div class="card-value income-text">${formatMoney(totalIncome)}</div></div>
              <div class="card"><div class="card-label"><i data-lucide="arrow-up-circle" style="width:14px;"></i> Despesas do mês</div><div class="card-value expense-text">${formatMoney(totalExpense)}</div></div>
              <div class="card"><div class="card-label"><i data-lucide="piggy-bank" style="width:14px;"></i> Economia</div><div class="card-value ${balance >= 0 ? 'income-text' : 'expense-text'}">${formatMoney(balance)}</div></div>
              <div class="card"><div class="card-label"><i data-lucide="gauge" style="width:14px;"></i> Limite diário (${dayLabel})</div><div class="card-value">${formatMoney(todayExp)} ${dailyLimit > 0 ? '/ ' + formatMoney(dailyLimit) : ''}</div>${dailyLimit > 0 ? `<div class="progress-bar"><div class="fill ${limitPct > 100 ? 'red' : 'accent'}" style="width:${limitPct}%"></div></div>` : ''}</div>
              <div class="card"><div class="card-label"><i data-lucide="calendar" style="width:14px;"></i> Limite semanal (7 dias)</div><div class="card-value">${formatMoney(weeklyExp)} ${weeklyLimit > 0 ? '/ ' + formatMoney(weeklyLimit) : ''}</div>${weeklyLimit > 0 ? `<div class="progress-bar"><div class="fill ${weeklyPct > 100 ? 'red' : 'accent'}" style="width:${weeklyPct}%"></div></div>` : '<p style="font-size:0.7em;color:var(--text-secondary);">Defina limites diários</p>'}</div>
              ${monthlyBudget > 0 ? `<div class="card"><div class="card-label"><i data-lucide="target" style="width:14px;"></i> Orçamento mensal</div><div class="card-value">${formatMoney(totalExpense)} / ${formatMoney(monthlyBudget)}</div><div class="progress-bar"><div class="fill ${monthlyPct > 100 ? 'red' : 'accent'}" style="width:${monthlyPct}%"></div></div></div>` : '<div class="card"><div class="card-label"><i data-lucide="target" style="width:14px;"></i> Orçamento mensal</div><p style="font-size:0.8em;">Não definido</p><button class="btn btn-outline btn-sm" onclick="navigate(\'configuracoes\')">Definir</button></div>'}
            </div>
            <div class="dashboard-two-col" style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px;">
              <div class="card"><div class="card-label">Fluxo financeiro</div><div style="position:relative;height:220px;"><canvas id="dashFlowChart"></canvas></div></div>
              <div class="card"><div class="card-label">Gastos por categoria</div>${topCats.map(([c, v]) => `<div style="display:flex;justify-content:space-between;padding:8px 0;font-size:0.8em;"><span>${c}</span><span style="font-weight:600;">${formatMoney(v)}</span></div>`).join('') || '<p style="color:var(--text-secondary);">Sem dados</p>'}</div>
            </div>
            <div class="card"><div class="card-label">Últimas movimentações</div>
              <div class="transaction-list">${recent.map(t => `
                <div class="transaction-item">
                  <div class="transaction-icon">${t.type === 'income' ? '↓' : '↑'}</div>
                  <div class="transaction-info"><div class="category">${t.category}</div><div class="meta">${formatDate(t.date)} · ${getAccountName(t.accountId)} ${t.excludeFromDailyLimit ? '· Fora do limite' : ''}</div></div>
                  <div class="transaction-amount ${t.type === 'income' ? 'positive' : 'negative'}">${t.type === 'income' ? '+' : '-'}${formatMoney(t.amount)}</div>
                </div>`).join('') || '<p style="color:var(--text-secondary);padding:12px;">Nenhum lançamento</p>'}</div>
            </div>`;
        }

        function renderCharts() {
            const canvas = document.getElementById('dashFlowChart');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            if (canvas._chart) canvas._chart.destroy();
            const last6 = [];
            for (let i = 5; i >= 0; i--) {
                const d = new Date(); d.setMonth(d.getMonth() - i);
                const y = d.getFullYear(), m = d.getMonth();
                const ms = `${y}-${String(m+1).padStart(2,'0')}-01`;
                const me = new Date(y, m+1, 0).toISOString().split('T')[0];
                const inc = appState.transactions.filter(t => t.type === 'income' && t.date >= ms && t.date <= me).reduce((s, t) => s + Number(t.amount), 0);
                const exp = appState.transactions.filter(t => t.type === 'expense' && t.date >= ms && t.date <= me).reduce((s, t) => s + Number(t.amount), 0);
                last6.push({ label: new Date(y, m).toLocaleDateString('pt-BR', { month: 'short' }), inc, exp });
            }
            canvas._chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: last6.map(l => l.label),
                    datasets: [
                        { label: 'Receitas', data: last6.map(l => l.inc), borderColor: '#46C2CB', backgroundColor: 'transparent', tension: 0.4, pointRadius: 2, borderWidth: 2 },
                        { label: 'Despesas', data: last6.map(l => l.exp), borderColor: '#EF4444', backgroundColor: 'transparent', tension: 0.4, pointRadius: 2, borderWidth: 2 }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { labels: { color: '#C4B8E0', font: { family: 'Inter', size: 11 }, usePointStyle: true, boxWidth: 8 } } },
                    scales: {
                        x: { ticks: { color: '#C4B8E0', font: { size: 10 } }, grid: { color: 'rgba(255,255,255,0.05)' } },
                        y: { ticks: { color: '#C4B8E0', font: { size: 10 } }, grid: { color: 'rgba(255,255,255,0.05)' } }
                    }
                }
            });
            if (currentSection === 'relatorios') {
                const rc = document.getElementById('reportBarChart');
                if (rc) {
                    if (rc._chart) rc._chart.destroy();
                    const expenseByCat = {};
                    appState.transactions.filter(t => t.type === 'expense').forEach(t => expenseByCat[t.category] = (expenseByCat[t.category] || 0) + Number(t.amount));
                    const sorted = Object.entries(expenseByCat).sort((a, b) => b[1] - a[1]);
                    rc._chart = new Chart(rc, {
                        type: 'bar',
                        data: {
                            labels: sorted.map(([c]) => c),
                            datasets: [{ label: 'Despesas', data: sorted.map(([, v]) => v), backgroundColor: 'rgba(109,103,228,0.6)', borderColor: '#6D67E4', borderWidth: 1, borderRadius: 6 }]
                        },
                        options: {
                            responsive: true, maintainAspectRatio: false,
                            indexAxis: sorted.length > 6 ? 'y' : 'x',
                            plugins: { legend: { labels: { color: '#C4B8E0', font: { family: 'Inter', size: 11 }, usePointStyle: true } } },
                            scales: {
                                x: { ticks: { color: '#C4B8E0', font: { size: 10 } }, grid: { color: 'rgba(255,255,255,0.05)' } },
                                y: { ticks: { color: '#C4B8E0', font: { size: 10 } }, grid: { color: 'rgba(255,255,255,0.05)' } }
                            }
                        }
                    });
                }
            }
        }

        // ==================== LISTA DE COMPRAS ====================
        function renderShoppingLists() {
            if (!appState.shoppingLists || appState.shoppingLists.length === 0) {
                appState.shoppingLists = JSON.parse(JSON.stringify(DEFAULT_SHOPPING_LISTS));
                saveState();
            }
            const list = appState.shoppingLists[0];
            let totalItems = 0, checkedItems = 0;
            list.categories.forEach(cat => { totalItems += cat.items.length; checkedItems += (cat.checked || []).length; });
            const progressPct = totalItems > 0 ? Math.round((checkedItems / totalItems) * 100) : 0;
            let html = `
            <div style="margin-bottom:16px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
              <span style="font-weight:600;">Progresso: ${checkedItems}/${totalItems} itens (${progressPct}%)</span>
              <div class="progress-bar" style="flex:1;min-width:100px;"><div class="fill accent" style="width:${progressPct}%"></div></div>
              <button class="btn btn-outline btn-sm" onclick="resetShoppingList()"><i data-lucide="rotate-ccw" style="width:14px;"></i> Resetar</button>
              <button class="btn btn-primary btn-sm" onclick="openAddShoppingItemModal()"><i data-lucide="plus" style="width:14px;"></i> Novo Item</button>
            </div>`;
            list.categories.forEach((cat, catIndex) => {
                const checkedInCat = (cat.checked || []).length;
                const totalInCat = cat.items.length;
                html += `
                <div class="shopping-category">
                  <div class="shopping-category-header" onclick="toggleShoppingCategory(this)" data-cat="${catIndex}">
                    <span>${cat.name} <span style="font-size:0.75em;color:var(--text-secondary);">(${checkedInCat}/${totalInCat})</span></span>
                    <i data-lucide="chevron-down" class="arrow" style="width:16px;"></i>
                  </div>
                  <div class="shopping-items" id="shoppingCat-${catIndex}">`;
                cat.items.forEach((item, itemIndex) => {
                    const isChecked = (cat.checked || []).includes(itemIndex);
                    html += `
                    <div class="shopping-item${isChecked ? ' checked' : ''}" onclick="toggleShoppingItem(${catIndex}, ${itemIndex})">
                      <input type="checkbox" ${isChecked ? 'checked' : ''} tabindex="-1">
                      <span class="item-name">${item}</span>
                      <button class="delete-item-btn" onclick="event.stopPropagation();deleteShoppingItem(${catIndex}, ${itemIndex})" title="Remover item">
                        <i data-lucide="x" style="width:14px;"></i>
                      </button>
                    </div>`;
                });
                html += `</div></div>`;
            });
            return html;
        }

        function toggleShoppingCategory(header) {
            const catIndex = header.getAttribute('data-cat');
            const itemsDiv = document.getElementById('shoppingCat-' + catIndex);
            const arrow = header.querySelector('.arrow');
            if (itemsDiv.style.display === 'none') { itemsDiv.style.display = 'block'; arrow.classList.add('open'); }
            else { itemsDiv.style.display = 'none'; arrow.classList.remove('open'); }
        }

        function toggleShoppingItem(catIndex, itemIndex) {
            const list = appState.shoppingLists[0];
            const cat = list.categories[catIndex];
            if (!cat.checked) cat.checked = [];
            const pos = cat.checked.indexOf(itemIndex);
            if (pos >= 0) cat.checked.splice(pos, 1); else cat.checked.push(itemIndex);
            saveState();
            navigate('listaCompras');
        }

        function deleteShoppingItem(catIndex, itemIndex) {
            const list = appState.shoppingLists[0];
            const cat = list.categories[catIndex];
            const itemName = cat.items[itemIndex];
            confirmDialog(`Remover "${itemName}" da lista?`, () => {
                cat.items.splice(itemIndex, 1);
                if (!cat.checked) cat.checked = [];
                cat.checked = cat.checked.filter(i => i !== itemIndex).map(i => i > itemIndex ? i - 1 : i);
                saveState();
                navigate('listaCompras');
                showToast('Item removido', 'error');
            });
        }

        function resetShoppingList() {
            confirmDialog('Resetar toda a lista de compras?', () => {
                appState.shoppingLists[0].categories.forEach(cat => { cat.checked = []; });
                saveState();
                navigate('listaCompras');
                showToast('Lista resetada!', 'success');
            });
        }

        function openAddShoppingItemModal() {
            const list = appState.shoppingLists[0];
            const catOptions = list.categories.map((cat, i) => `<option value="${i}">${cat.name}</option>`).join('');
            const body = `
            <div class="form-group"><label>Categoria</label><select id="addItemCat">${catOptions}</select></div>
            <div class="form-group"><label>Nome do Item</label><input type="text" id="addItemName" placeholder="Ex: Creme de leite"></div>`;
            openModal('Adicionar Item', body, () => {
                const catIndex = parseInt(document.getElementById('addItemCat').value);
                const itemName = document.getElementById('addItemName').value.trim();
                if (!itemName) { showToast('Digite o nome do item', 'error'); return; }
                list.categories[catIndex].items.push(itemName);
                if (!list.categories[catIndex].checked) list.categories[catIndex].checked = [];
                saveState();
                closeModal();
                navigate('listaCompras');
                showToast('Item adicionado!', 'success');
            });
        }

        // ==================== TRANSAÇÕES ====================
        function renderTransactionList(type) {
            const items = appState.transactions.filter(t => t.type === type).sort((a, b) => b.date.localeCompare(a.date));
            return `<div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;"><button class="btn btn-primary" onclick="openTransactionModal('${type}')"><i data-lucide="plus"></i> Novo</button><input type="text" placeholder="Buscar..." oninput="filterTransactions(this.value,'${type}')" style="background:var(--card);border:1px solid var(--border);border-radius:50px;padding:8px 16px;color:var(--text);width:180px;max-width:100%;min-height:40px;font-family:var(--font);"></div>
            <div class="transaction-list" id="transList-${type}">${items.map(t => `<div class="transaction-item" data-search="${t.category} ${t.description||''}"><div class="transaction-icon">${type==='income'?'↓':'↑'}</div><div class="transaction-info"><div class="category">${t.category} ${t.subcategory||''}</div><div class="meta">${formatDate(t.date)} · ${getAccountName(t.accountId)} ${t.excludeFromDailyLimit ? '· Fora do limite' : ''}</div></div><div class="transaction-amount ${type==='income'?'positive':'negative'}">${formatMoney(t.amount)}</div><div style="display:flex;gap:4px;"><button class="btn btn-outline btn-sm" onclick="editTransaction('${t.id}')"><i data-lucide="pencil" style="width:14px;"></i></button> <button class="btn btn-danger btn-sm" onclick="deleteTransaction('${t.id}')"><i data-lucide="trash-2" style="width:14px;"></i></button></div></div>`).join('') || '<p style="color:var(--text-secondary);padding:16px;">Nenhum registro</p>'}</div>`;
        }

        function filterTransactions(query, type) {
            document.querySelectorAll(`#transList-${type} .transaction-item`).forEach(el => {
                el.style.display = (el.getAttribute('data-search') || '').toLowerCase().includes(query.toLowerCase()) ? '' : 'none';
            });
        }

        function openTransactionModal(type, editId = null) {
            const existing = editId ? appState.transactions.find(t => t.id === editId) : null;
            const cats = type === 'income' ? appState.customCategories.income : appState.customCategories.expense;
            const accOpts = appState.accounts.map(a => `<option value="${a.id}" ${existing&&existing.accountId===a.id?'selected':''}>${a.name}</option>`).join('') || '<option value="">Nenhuma conta</option>';
            const cardOpts = type === 'expense' ? `
            <div class="form-group"><label>Cartão</label><select id="modalCard"><option value="">Nenhum</option>${appState.creditCards.map(c=>`<option value="${c.id}" ${existing&&existing.cardId===c.id?'selected':''}>${c.name}</option>`).join('')}</select></div>` : '';
            const excludeLimitCheck = type === 'expense' ? `
            <div class="form-group">
              <label style="display:flex;align-items:center;gap:10px;cursor:pointer;">
                <input type="checkbox" id="modalExcludeLimit" ${existing&&existing.excludeFromDailyLimit?'checked':''}> Excluir do limite diário
              </label>
              <small style="color:var(--text-secondary);display:block;margin-top:4px;">Marque se esta despesa não deve contar no limite diário/semanal.</small>
            </div>` : '';
            const body = `<input type="hidden" id="modalEditId" value="${editId||''}"><input type="hidden" id="modalType" value="${type}">
            <div class="form-group"><label>Valor</label><input type="number" id="modalAmount" step="0.01" value="${existing?existing.amount:''}" required></div>
            <div class="row-flex"><div class="form-group"><label>Categoria</label><select id="modalCategory">${cats.map(c=>`<option ${existing&&existing.category===c?'selected':''}>${c}</option>`).join('')}</select></div><div class="form-group"><label>Subcategoria</label><input type="text" id="modalSubcategory" value="${existing?existing.subcategory||'':''}"></div></div>
            <div class="form-group"><label>Data</label><input type="date" id="modalDate" value="${existing?existing.date:getTodayDate()}"></div>
            <div class="form-group"><label>Conta</label><select id="modalAccount">${accOpts}</select></div>${cardOpts}
            <div class="form-group"><label>Descrição</label><input type="text" id="modalDescription" value="${existing?existing.description||'':''}"></div>
            <div class="form-group"><label><input type="checkbox" id="modalRecurring" ${existing&&existing.recurring?'checked':''}> Recorrente</label></div>
            ${excludeLimitCheck}`;

            openModal(type === 'income' ? 'Receita' : 'Despesa', body, () => {
                const amt = parseFloat(document.getElementById('modalAmount').value);
                if (!amt || amt <= 0) { showToast('Valor inválido', 'error'); return; }
                const excludeChecked = document.getElementById('modalExcludeLimit')?.checked || false;

                // NOVO: Se for despesa e o checkbox NÃO estiver marcado, pergunta antes de salvar
                if (type === 'expense' && !excludeChecked) {
                    // Fecha a modal atual
                    closeModal();
                    // Pergunta se deseja excluir do limite
                    const shouldExclude = confirm(
                        '🚫 Deseja excluir esta despesa do limite diário?\n\n' +
                        'SIM = Não contará no limite diário/semanal\n' +
                        'NÃO = Contará normalmente no limite'
                    );
                    // Reabre o modal rapidamente com o checkbox ajustado
                    // Para evitar complexidade, vamos refazer a chamada com um flag
                    // Usamos uma abordagem mais simples: chamamos a função de novo com o valor correto
                    // Mas como o modal já fechou, vamos recriar com o checkbox marcado se o usuário disse SIM
                    const newExclude = shouldExclude;
                    // Reabre o modal com o mesmo estado, mas forçando o checkbox
                    // Vamos criar uma função auxiliar que finaliza o salvamento
                    const finishSave = (excludeVal) => {
                        const data = {
                            id: editId || generateId(),
                            type,
                            amount: amt,
                            category: document.getElementById('modalCategory').value,
                            subcategory: document.getElementById('modalSubcategory').value,
                            date: document.getElementById('modalDate').value,
                            accountId: document.getElementById('modalAccount').value,
                            description: document.getElementById('modalDescription').value,
                            recurring: document.getElementById('modalRecurring').checked,
                            cardId: type === 'expense' ? (document.getElementById('modalCard')?.value || null) : null,
                            status: 'paid',
                            excludeFromDailyLimit: excludeVal
                        };
                        if (editId) { const idx = appState.transactions.findIndex(t => t.id === editId); if (idx >= 0) appState.transactions[idx] = data; }
                        else appState.transactions.push(data);
                        saveState();
                        navigate(currentSection);
                        showToast('Salvo com sucesso!', 'success');
                        if (type === 'expense' && !data.excludeFromDailyLimit) {
                            const todayExp = getTodayExpenses();
                            const limit = getDailyLimit();
                            if (limit > 0 && todayExp > limit) showToast('⚠️ Limite diário excedido!', 'warning');
                            else if (limit > 0 && todayExp < limit) celebrate();
                        }
                    };

                    // Reabrimos o modal brevemente para capturar os valores novamente
                    // (os campos originais não existem mais, mas podemos recriar um modal simplificado)
                    // Solução mais elegante: vamos reabrir o modal com o checkbox já definido
                    // e pular a pergunta novamente usando uma flag.

                    // Vamos usar uma abordagem mais direta: chamamos finishSave com o valor decidido.
                    // Para isso, precisamos dos valores dos campos, mas eles já foram lidos.
                    // Podemos armazenar os valores em variáveis antes de fechar o modal? Sim.

                    // Como já fechamos, vamos reabrir um modal de confirmação simples.
                    const confirmBody = `
                    <p><strong>${formatMoney(amt)}</strong> - ${document.getElementById('modalCategory')?.value || ''}</p>
                    <p style="color:var(--text-secondary);">Deseja que esta despesa <strong>NÃO</strong> conte no limite diário?</p>
                    <div style="display:flex;gap:10px;margin-top:16px;">
                      <button class="btn btn-outline" id="confirmExcludeYes" style="flex:1;">Sim, excluir do limite</button>
                      <button class="btn btn-primary" id="confirmExcludeNo" style="flex:1;">Não, contar no limite</button>
                    </div>`;
                    openModal('Excluir do Limite Diário?', confirmBody, () => closeModal());
                    setTimeout(() => {
                        document.getElementById('confirmExcludeYes')?.addEventListener('click', () => {
                            closeModal();
                            finishSave(true);
                        });
                        document.getElementById('confirmExcludeNo')?.addEventListener('click', () => {
                            closeModal();
                            finishSave(false);
                        });
                        lucide.createIcons();
                    }, 100);
                    return;
                }

                // Se chegou aqui, é receita ou despesa com checkbox já marcado
                const data = {
                    id: editId || generateId(),
                    type,
                    amount: amt,
                    category: document.getElementById('modalCategory').value,
                    subcategory: document.getElementById('modalSubcategory').value,
                    date: document.getElementById('modalDate').value,
                    accountId: document.getElementById('modalAccount').value,
                    description: document.getElementById('modalDescription').value,
                    recurring: document.getElementById('modalRecurring').checked,
                    cardId: type === 'expense' ? (document.getElementById('modalCard')?.value || null) : null,
                    status: 'paid',
                    excludeFromDailyLimit: excludeChecked
                };
                if (editId) { const idx = appState.transactions.findIndex(t => t.id === editId); if (idx >= 0) appState.transactions[idx] = data; }
                else appState.transactions.push(data);
                saveState();
                closeModal();
                navigate(currentSection);
                showToast('Salvo', 'success');
                if (type === 'expense' && !data.excludeFromDailyLimit) {
                    const todayExp = getTodayExpenses();
                    const limit = getDailyLimit();
                    if (limit > 0 && todayExp > limit) showToast('⚠️ Limite diário excedido!', 'warning');
                    else if (limit > 0 && todayExp < limit) celebrate();
                }
            });
        }

        function editTransaction(id) { const t = appState.transactions.find(x => x.id === id); if (t) openTransactionModal(t.type, id); }
