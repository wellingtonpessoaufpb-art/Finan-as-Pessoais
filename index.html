<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no, maximum-scale=1.0">
    <meta name="theme-color" content="#453C67">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>FinanceHub · Gestão Financeira</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest">
    </script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js">
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js">
    </script>
    <style>
        :root {
            --bg: #453C67;
            --card: #3A3159;
            --card-secondary: #4B3F6B;
            --text: #FFFFFF;
            --text-secondary: #C4B8E0;
            --border: rgba(255, 255, 255, 0.08);
            --accent: #6D67E4;
            --accent-hover: #7B73F0;
            --income: #46C2CB;
            --expense: #EF4444;
            --warning: #F2F7A1;
            --info: #3B82F6;
            --radius: 20px;
            --radius-sm: 14px;
            --radius-xs: 10px;
            --transition: 250ms cubic-bezier(0.4, 0, 0.2, 1);
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2), 0 2px 4px -2px rgba(0, 0, 0, 0.2);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 4px 6px -4px rgba(0, 0, 0, 0.2);
            --sidebar-width: 260px;
            --header-height: 64px;
            --bottom-nav-height: 64px;
            --font: 'Inter', system-ui, -apple-system, sans-serif;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        .light-mode {
            --bg: #F8FAFC;
            --card: #FFFFFF;
            --card-secondary: #F1F5F9;
            --text: #0F172A;
            --text-secondary: #64748B;
            --border: rgba(0, 0, 0, 0.06);
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.08), 0 4px 6px -4px rgba(0, 0, 0, 0.04);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            display: flex;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            transition: background var(--transition), color var(--transition);
            -webkit-font-smoothing: antialiased;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
            position: relative;
        }

        ::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 3px;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        @keyframes scaleIn {
            from {
                transform: scale(0.94);
                opacity: 0;
            }
            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        @keyframes slideUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        @keyframes confetti {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(-200px) rotate(720deg);
                opacity: 0;
            }
        }

        @keyframes syncPulse {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: 0.4;
            }
        }

        .animate-in {
            animation: fadeInUp 0.5s ease forwards;
            opacity: 0;
        }

        .confetti-piece {
            position: fixed;
            width: 10px;
            height: 10px;
            border-radius: 2px;
            z-index: 9999;
            animation: confetti 1.5s ease-out forwards;
            pointer-events: none;
        }

        .sidebar {
            width: var(--sidebar-width);
            background: var(--card);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            z-index: 100;
            border-right: 1px solid var(--border);
            transition: transform var(--transition), width var(--transition);
            overflow-y: auto;
            overflow-x: hidden;
            position: relative;
        }

        .sidebar .logo {
            padding: 24px 20px 20px;
            font-weight: 600;
            font-size: 1.1em;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: -0.3px;
            flex-shrink: 0;
        }

        .sidebar .logo img {
            height: 44px;
            width: auto;
            filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.3));
            transition: transform 0.3s ease;
            flex-shrink: 0;
        }

        .sidebar nav {
            flex: 1;
            padding: 8px 0;
            overflow-y: auto;
        }

        .sidebar nav a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 20px;
            margin: 2px 8px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.83em;
            font-weight: 500;
            border-radius: 10px;
            transition: all var(--transition);
            cursor: pointer;
            position: relative;
            white-space: nowrap;
            min-height: 44px;
        }

        .sidebar nav a i {
            stroke-width: 1.5;
            width: 20px;
            height: 20px;
            flex-shrink: 0;
        }

        .sidebar nav a:hover {
            background: rgba(255, 255, 255, 0.04);
            color: var(--text);
        }

        .sidebar nav a.active {
            background: rgba(109, 103, 228, 0.15);
            color: var(--accent);
            font-weight: 600;
        }

        .sidebar nav a.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 3px;
            height: 20px;
            background: var(--accent);
            border-radius: 0 3px 3px 0;
        }

        .sidebar-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            font-size: 0.72em;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .sidebar-footer .theme-toggle {
            cursor: pointer;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            transition: all var(--transition);
        }

        .sidebar-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.55);
            z-index: 149;
            animation: fadeIn 0.25s ease;
            backdrop-filter: blur(2px);
        }

        .sidebar-overlay.visible {
            display: block;
        }

        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background: var(--bg);
            min-width: 0;
            position: relative;
        }

        .header {
            height: var(--header-height);
            min-height: var(--header-height);
            background: var(--card);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 50;
            gap: 10px;
            flex-shrink: 0;
        }

        .header h2 {
            font-size: 1.1em;
            font-weight: 600;
            letter-spacing: -0.3px;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .header-actions {
            display: flex;
            gap: 6px;
            align-items: center;
            flex-shrink: 0;
        }

        .sync-indicator {
            font-size: 0.68em;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
            flex-shrink: 0;
            user-select: none;
            padding: 4px 8px;
            border-radius: 20px;
            background: var(--card-secondary);
            transition: all var(--transition);
        }
        .sync-indicator .sync-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
            transition: background 0.3s;
        }
        .sync-dot.syncing {
            background: #F2C94C;
            animation: syncPulse 0.8s ease-in-out infinite;
        }
        .sync-dot.saved {
            background: #46C2CB;
        }
        .sync-dot.error {
            background: #EF4444;
        }
        .sync-dot.offline {
            background: #9CA3AF;
        }

        .hamburger-btn {
            display: none;
            width: 40px;
            height: 40px;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            border: none;
            background: transparent;
            color: var(--text);
            cursor: pointer;
        }

        .content {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 20px;
            transition: opacity 0.3s ease, transform 0.3s ease;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior-y: contain;
        }

        .bottom-nav {
            display: none;
            height: var(--bottom-nav-height);
            background: var(--card);
            border-top: 1px solid var(--border);
            z-index: 120;
            flex-shrink: 0;
            padding: 0 8px;
            padding-bottom: var(--safe-bottom);
            align-items: center;
            justify-content: space-around;
        }

        .bottom-nav button {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 6px 4px;
            border-radius: 10px;
            transition: all var(--transition);
            font-family: var(--font);
            font-size: 0.65em;
            font-weight: 500;
            min-height: 48px;
        }

        .bottom-nav button i {
            width: 22px;
            height: 22px;
            stroke-width: 1.8;
        }

        .bottom-nav button.active {
            color: var(--accent);
            font-weight: 600;
        }

        .bottom-nav button.fab-btn {
            position: relative;
            top: -16px;
            background: var(--accent);
            color: #fff;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            flex: 0 0 48px;
            box-shadow: 0 4px 15px rgba(109, 103, 228, 0.4);
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0;
        }

        .bottom-nav button.fab-btn i {
            width: 24px;
            height: 24px;
            color: #fff;
        }

        .grid-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 14px;
            margin-bottom: 20px;
        }

        .card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 18px 20px;
            border: 1px solid var(--border);
            transition: all var(--transition);
            position: relative;
            overflow: hidden;
        }

        .card:hover {
            border-color: rgba(255, 255, 255, 0.15);
            box-shadow: var(--shadow);
            transform: translateY(-2px);
        }

        .card-label {
            font-size: 0.7em;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .card-value {
            font-size: 1.5em;
            font-weight: 700;
            letter-spacing: -0.5px;
            line-height: 1.1;
        }

        .income-text {
            color: var(--income);
        }

        .expense-text {
            color: var(--expense);
        }

        .btn {
            padding: 9px 16px;
            border-radius: 50px;
            border: none;
            cursor: pointer;
            font-weight: 500;
            font-size: 0.8em;
            transition: all var(--transition);
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-family: var(--font);
            letter-spacing: 0.2px;
            background: transparent;
            color: var(--text);
            white-space: nowrap;
            min-height: 40px;
            position: relative;
            overflow: hidden;
        }

        @keyframes ripple {
            to {
                opacity: 0;
                transform: scale(20, 20) translate(-50%, -50%);
            }
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 5px;
            height: 5px;
            background: rgba(255, 255, 255, 0.3);
            opacity: 0;
            border-radius: 100%;
            transform: scale(1, 1) translate(-50%, -50%);
            transform-origin: 50% 50%;
        }

        .btn:active::after {
            animation: ripple 0.6s ease-out;
        }

        .btn-primary {
            background: var(--accent);
            color: #FFFFFF;
            font-weight: 600;
        }

        .btn-primary:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(109, 103, 228, 0.3);
        }

        .btn-danger {
            background: transparent;
            color: var(--expense);
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .btn-danger:hover {
            background: rgba(239, 68, 68, 0.1);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-secondary);
        }

        .btn-outline:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        .btn-sm {
            padding: 5px 12px;
            font-size: 0.72em;
            min-height: 34px;
        }

        .transaction-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .transaction-item {
            display: flex;
            align-items: center;
            padding: 12px 14px;
            background: var(--card);
            border-radius: var(--radius-sm);
            border: 1px solid transparent;
            transition: all var(--transition);
            gap: 10px;
            flex-wrap: wrap;
        }

        .transaction-item:hover {
            border-color: var(--border);
            background: var(--card-secondary);
        }

        .transaction-icon {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            background: var(--card-secondary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 0.8em;
            flex-shrink: 0;
        }

        .transaction-info {
            flex: 1;
            min-width: 0;
        }

        .transaction-info .category {
            font-weight: 600;
            font-size: 0.83em;
        }

        .transaction-info .meta {
            font-size: 0.7em;
            color: var(--text-secondary);
            margin-top: 2px;
        }

        .transaction-amount {
            font-weight: 700;
            font-size: 0.85em;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .transaction-amount.positive {
            color: var(--income);
        }

        .transaction-amount.negative {
            color: var(--expense);
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 200;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease;
            padding: 20px;
        }

        .modal {
            background: var(--card);
            border-radius: var(--radius);
            padding: 28px 24px;
            width: 100%;
            max-width: 500px;
            max-height: 85vh;
            max-height: 85dvh;
            overflow-y: auto;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-lg);
            animation: scaleIn 0.2s ease;
        }

        .modal h3 {
            font-size: 1.05em;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            font-size: 0.72em;
            margin-bottom: 5px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            height: 46px;
            padding: 0 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 0.85em;
            background: var(--card-secondary);
            color: var(--text);
            font-family: var(--font);
            transition: all var(--transition);
            appearance: none;
        }

        .form-group textarea {
            height: auto;
            padding: 10px 14px;
            resize: vertical;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(109, 103, 228, 0.15);
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 24px;
            flex-wrap: wrap;
        }

        .row-flex {
            display: flex;
            gap: 12px;
        }

        .row-flex>* {
            flex: 1;
            min-width: 0;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            padding: 12px 20px;
            border-radius: 50px;
            z-index: 999;
            font-weight: 500;
            font-size: 0.78em;
            animation: slideUp 0.3s ease;
            box-shadow: var(--shadow-lg);
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 8px;
            max-width: 90vw;
            transition: opacity 0.3s, transform 0.3s;
        }

        .toast.success {
            border-left: 3px solid var(--income);
        }

        .toast.error {
            border-left: 3px solid var(--expense);
        }

        .toast.warning {
            border-left: 3px solid var(--warning);
        }

        .login-container {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            height: 100dvh;
            width: 100vw;
            background: var(--bg);
            padding: 20px;
        }

        .login-box {
            background: var(--card);
            padding: 40px 32px;
            border-radius: var(--radius);
            width: 400px;
            max-width: 100%;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-lg);
            text-align: center;
        }

        .login-box .login-logo {
            height: 72px;
            margin-bottom: 16px;
        }

        .login-box input {
            width: 100%;
            height: 50px;
            padding: 0 16px;
            margin: 10px 0;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 1em;
            text-align: center;
            letter-spacing: 4px;
            font-weight: 500;
            background: var(--card-secondary);
            color: var(--text);
        }

        .progress-bar {
            height: 4px;
            background: var(--border);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 6px;
        }

        .progress-bar .fill {
            height: 100%;
            border-radius: 10px;
            transition: width 0.6s ease;
        }

        .fill.accent {
            background: var(--accent);
        }

        .fill.green {
            background: var(--income);
        }

        .fill.red {
            background: var(--expense);
        }

        .settings-card input,
        .settings-card select,
        .settings-card textarea {
            height: 46px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: var(--card-secondary);
            color: var(--text);
            padding: 0 14px;
            font-family: var(--font);
            font-size: 0.85em;
            width: 100%;
        }

        .settings-card textarea {
            height: 70px;
            padding: 10px 14px;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
            text-align: center;
            font-size: 0.8em;
        }

        .calendar-grid .day {
            padding: 10px 4px;
            border-radius: 8px;
            cursor: pointer;
            min-height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 500;
            position: relative;
        }

        .calendar-grid .day.header {
            font-weight: 700;
            color: var(--text-secondary);
            font-size: 0.7em;
            cursor: default;
            pointer-events: none;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .calendar-grid .day.today {
            background: var(--accent);
            color: #fff;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            margin: auto;
        }

        .calendar-grid .day.has-event::after {
            content: '';
            position: absolute;
            bottom: 3px;
            left: 50%;
            transform: translateX(-50%);
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--accent);
        }

        .badge {
            display: inline-flex;
            align-items: center;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.68em;
            font-weight: 600;
            white-space: nowrap;
        }

        .shopping-category {
            margin-bottom: 20px;
            border-radius: var(--radius-sm);
            overflow: hidden;
            background: var(--card);
            border: 1px solid var(--border);
        }

        .shopping-category-header {
            padding: 12px 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--card-secondary);
            font-weight: 600;
            font-size: 0.85em;
            user-select: none;
            transition: background var(--transition);

            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 16px;

            transition: all var(--transition);

    <script>
        // ====================
        // GOOGLE API
        // ====================
        const API_URL =
            "https://script.google.com/macros/s/AKfycbynwOsG22rFHoMTLFnle8v2bxLU3EkEv2QzzDkSA37zC5cYSUZNUd4vjB5muRTk6vi1_A/exec";

        const FinanceAPI = {
            async load() {
                try {
                    const response = await fetch(API_URL + '?action=load', {
                        method: 'GET',
                        headers: { 'Accept': 'application/json' }
                    });
                    if (!response.ok) throw new Error('HTTP ' + response.status);
                    const result = await response.json();
                    if (result && result.success && result.data) {
                        return result.data;
                    }
                    if (result && !result.success && result.message) {
                        console.warn('API retornou erro:', result.message);
                    }
                    return null;
                } catch (e) {
                    console.warn('FinanceAPI.load() falhou:', e.message);
                    return null;
                }
            },

            async save(data) {
                try {
                    const payload = JSON.stringify({ action: 'save', data: data });
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Accept': 'application/json'
                        },
                        body: payload
                    });
                    if (!response.ok) throw new Error('HTTP ' + response.status);
                    const result = await response.json();
                    return result;
                } catch (e) {
                    console.warn('FinanceAPI.save() falhou:', e.message);
                    throw e;
                }
            },

            async get(table) {
                try {
                    const response = await fetch(API_URL + '?action=get&table=' + encodeURIComponent(table), {
                        method: 'GET',
                        headers: { 'Accept': 'application/json' }
                    });
                    if (!response.ok) throw new Error('HTTP ' + response.status);
                    return await response.json();
                } catch (e) {
                    console.warn('FinanceAPI.get() falhou:', e.message);
                    throw e;
                }
            },

            async insert(table, record) {
                try {
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Accept': 'application/json'
                        },
                        body: JSON.stringify({ action: 'insert', table: table, data: record })
                    });
                    if (!response.ok) throw new Error('HTTP ' + response.status);
                    return await response.json();
                } catch (e) {
                    console.warn('FinanceAPI.insert() falhou:', e.message);
                    throw e;
                }
            },

            async update(table, id, record) {
                try {
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Accept': 'application/json'
                        },
                        body: JSON.stringify({ action: 'update', table: table, id: id, data: record })
                    });
                    if (!response.ok) throw new Error('HTTP ' + response.status);
                    return await response.json();
                } catch (e) {
                    console.warn('FinanceAPI.update() falhou:', e.message);
                    throw e;
                }
            },

            async delete(table, id) {
                try {
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Accept': 'application/json'
                        },
                        body: JSON.stringify({ action: 'delete', table: table, id: id })
                    });
                    if (!response.ok) throw new Error('HTTP ' + response.status);
                    return await response.json();
                } catch (e) {
                    console.warn('FinanceAPI.delete() falhou:', e.message);
                    throw e;
                }
            },

            async clearAll() {
                try {
                    const response = await fetch(API_URL, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Accept': 'application/json'
                        },
                        body: JSON.stringify({ action: 'clearAll' })
                    });
                    if (!response.ok) throw new Error('HTTP ' + response.status);
                    return await response.json();
                } catch (e) {
                    console.warn('FinanceAPI.clearAll() falhou:', e.message);
                    throw e;
                }
            }
        };

        // ====================
        // SINCRONIZAÇÃO
        // ====================
        let syncInProgress = false;
        let lastSyncSuccess = false;
        let isOnline = typeof navigator !== 'undefined' ? navigator.onLine : true;

        function updateSyncStatus(status, messageFull, messageShort) {
            const dot = document.getElementById('syncDot');
            const textFull = document.getElementById('syncTextFull');
            const textShort = document.getElementById('syncTextShort');
            if (dot) {
                dot.className = 'sync-dot ' + status;
            }
            if (textFull) textFull.textContent = messageFull || '';
            if (textShort) textShort.textContent = messageShort || messageFull || '';
        }

        async function syncData() {
            if (syncInProgress) return;
            if (!isOnline) {
                updateSyncStatus('offline', 'Sem conexão', 'Off');
                return;
            }
            syncInProgress = true;
            updateSyncStatus('syncing', 'Sincronizando...', 'Sync');
            try {
                const result = await FinanceAPI.save(appState);
                if (result && result.success) {
                    lastSyncSuccess = true;
                    updateSyncStatus('saved', 'Dados salvos', 'OK');
                } else {
                    throw new Error(result?.message || 'Falha na API');
                }
            } catch (e) {
                lastSyncSuccess = false;
                updateSyncStatus('error', 'Erro ao sincronizar', 'Erro');
                console.warn('Sync falhou:', e.message);
                if (!isOnline) {
                    showToast('Sem conexão. Os dados serão sincronizados quando a conexão voltar.', 'warning');
                }
            } finally {
                syncInProgress = false;
            }
        }

        async function loadFromCloud() {
            if (!isOnline) {
                console.warn('Offline, usando dados locais padrão.');
                updateSyncStatus('offline', 'Sem conexão', 'Off');
                return false;
            }
            updateSyncStatus('syncing', 'Carregando...', 'Load');
            try {
                const data = await FinanceAPI.load();
                if (data && typeof data === 'object') {
                    // Mesclar dados da nuvem com appState
                    if (data.pin) appState.pin = data.pin;
                    if (data.darkMode !== undefined) appState.darkMode = data.darkMode;
                    if (data.accounts) appState.accounts = data.accounts;
                    if (data.transactions) appState.transactions = data.transactions;
                    if (data.creditCards) appState.creditCards = data.creditCards;
                    if (data.bills) appState.bills = data.bills;
                    if (data.budgets) appState.budgets = data.budgets;
                    if (data.goals) appState.goals = data.goals;
                    if (data.transfers) appState.transfers = data.transfers;
                    if (data.dailyLimits) appState.dailyLimits = data.dailyLimits;
                    if (data.monthlyBudget !== undefined) appState.monthlyBudget = data.monthlyBudget;
                    if (data.shoppingLists && data.shoppingLists.length > 0) {
                        appState.shoppingLists = data.shoppingLists;
                        // Garantir checked array
                        appState.shoppingLists.forEach(list => {
                            list.categories.forEach(cat => {
                                if (!cat.checked) cat.checked = [];
                            });
                        });
                    }
                    if (data.customCategories) appState.customCategories = data.customCategories;
                    lastSyncSuccess = true;
                    updateSyncStatus('saved', 'Dados carregados', 'OK');
                    console.log('✅ Dados carregados da nuvem com sucesso.');
                    return true;
                }
                updateSyncStatus('saved', 'Usando padrões', 'OK');
                return false;
            } catch (e) {
                console.warn('Falha ao carregar da nuvem:', e.message);
                updateSyncStatus('error', 'Erro ao carregar', 'Erro');
                return false;
            }
        }

        // Reconexão automática
        window.addEventListener('online', async () => {
            isOnline = true;
            updateSyncStatus('syncing', 'Reconectando...', 'Sync');
            showToast('Conexão restaurada. Sincronizando dados...', 'success');
            await syncData();
            if (currentSection === 'dashboard' || currentSection === 'relatorios') {
                setTimeout(renderCharts, 400);
            }
        });

        window.addEventListener('offline', () => {
            isOnline = false;
            updateSyncStatus('offline', 'Sem conexão', 'Off');
            showToast('Sem conexão. Os dados serão sincronizados quando a conexão voltar.', 'warning');
        });

        // Sincronização automática a cada 60 segundos
        let autoSyncInterval = null;

        function startAutoSync() {
            if (autoSyncInterval) clearInterval(autoSyncInterval);
            autoSyncInterval = setInterval(async () => {
                if (isOnline && !syncInProgress) {
                    await syncData();
                }
            }, 60000);
        }

        function stopAutoSync() {
            if (autoSyncInterval) {
                clearInterval(autoSyncInterval);
                autoSyncInterval = null;
            }
        }

        // ====================
        // STATE
        // ====================
        const DEFAULT_PIN = '1234';

        const DEFAULT_SHOPPING_LISTS = [{

                    ], checked: [] },

                        'Creme de leite', 'Leite condensado'
                    ], checked: [] },
                { name: '🍞 Padaria', items: ['Pão francês', 'Pão de forma', 'Torradas', 'Biscoito salgado',
                        'Biscoito doce', 'Bolacha recheada'
                    ], checked: [] },
                { name: '🌾 Grãos e Cereais', items: ['Arroz', 'Feijão', 'Macarrão', 'Farinha de trigo',
                        'Farinha de mandioca', 'Fubá', 'Aveia', 'Milho para pipoca'
                    ], checked: [] },
                { name: '🥫 Enlatados e Conservas', items: ['Milho verde', 'Ervilha', 'Molho de tomate',
                        'Extrato de tomate', 'Azeitona', 'Palmito'
                    ], checked: [] },
                { name: '🥬 Hortifruti', items: ['Alface', 'Tomate', 'Cebola', 'Alho', 'Batata', 'Cenoura',
                        'Pimentão', 'Pepino', 'Couve', 'Brócolis', 'Banana', 'Maçã', 'Laranja', 'Mamão',
                        'Limão', 'Abacaxi'
                    ], checked: [] },
                { name: '🧂 Temperos e Condimentos', items: ['Sal', 'Açúcar', 'Café', 'Óleo de soja', 'Azeite',
                        'Vinagre', 'Pimenta-do-reino', 'Orégano', 'Colorau', 'Cominho', 'Caldo de carne',
                        'Caldo de galinha'
                    ], checked: [] },
                { name: '🍬 Doces e Sobremesas', items: ['Chocolate', 'Gelatina', 'Pudim', 'Achocolatado',
                        'Doce de leite'
                    ], checked: [] },
                { name: '🥤 Bebidas', items: ['Água mineral', 'Refrigerante', 'Suco', 'Chá', 'Café',
                        'Água de coco'
                    ], checked: [] },
                { name: '🧼 Limpeza', items: ['Detergente', 'Sabão em pó', 'Sabão em barra', 'Amaciante',
                        'Água sanitária', 'Desinfetante', 'Limpador multiuso', 'Esponja', 'Palha de aço',
                        'Saco de lixo', 'Papel toalha'
                    ], checked: [] },
                { name: '🧴 Higiene Pessoal', items: ['Papel higiênico', 'Creme dental', 'Escova de dentes',
                        'Sabonete', 'Shampoo', 'Condicionador', 'Desodorante', 'Fio dental', 'Cotonetes',

                    ], checked: [] },

                        'Fórmula infantil'

                { name: '🏠 Utilidades Domésticas', items: ['Papel alumínio', 'Filme plástico', 'Guardanapo',

        let appState = {
            pin: DEFAULT_PIN,
            darkMode: true,
            accounts: [],
            transactions: [],
            creditCards: [],
            bills: [],
            budgets: [],
            goals: [],
            transfers: [],
            dailyLimits: { weekday: 0, saturday: 0, sunday: 0 },
            monthlyBudget: 0,
            shoppingLists: JSON.parse(JSON.stringify(DEFAULT_SHOPPING_LISTS)),
            customCategories: {
                expense: ['Moradia', 'Alimentação', 'Transporte', 'Saúde', 'Educação', 'Lazer', 'Compras',
                    'Assinaturas', 'Pets', 'Impostos', 'Outros'
                ],
                income: ['Salário', 'Freelance', 'Comissão', 'Venda', 'Presente', 'Outros']
            }
        };

        // saveState agora é assíncrono e sincroniza com a nuvem
        async function saveState() {
            await syncData();
        }

        // loadState foi substituído por loadFromCloud()
        // Mantido como compatibilidade, mas não usa mais localStorage
        async function loadState() {
            await loadFromCloud();
        }

        function generateId() { return 'id_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6); }

        function formatMoney(val) { return 'R$ ' + Number(val).toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g,
                '.'); }

        function formatDate(d) { if (!d) return ''; return new Date(d + 'T00:00:00').toLocaleDateString('pt-BR', { timeZone: 'UTC' }); }

        function getMonthRange() { const n = new Date(); const s = new Date(n.getFullYear(), n.getMonth(), 1); const e = new Date(n
                .getFullYear(), n.getMonth() + 1, 0); return { start: s.toISOString().split('T')[0], end: e.toISOString().split(
                    'T')[0] }; }

        function getTodayDate() { return new Date().toISOString().split('T')[0]; }

        function getDayType(d) { const day = new Date(d + 'T00:00:00').getDay(); if (day === 0) return 'sunday'; if (day === 6)
                return 'saturday'; return 'weekday'; }

        function getDailyLimit() { return appState.dailyLimits[getDayType(getTodayDate())] || 0; }

        function getTodayExpenses() { return appState.transactions.filter(t => t.type === 'expense' && t.date === getTodayDate() &&
                t.status !== 'cancelled').reduce((s, t) => s + Number(t.amount), 0); }

        function getAccountName(id) { const a = appState.accounts.find(x => x.id === id); return a ? a.name : '—'; }

        function isMobile() { return window.innerWidth < 768; }

        function getWeekRange() {
            const today = new Date();
            const start = new Date(today);
            start.setDate(today.getDate() - 6);
            const dates = [];
            for (let d = new Date(start); d <= today; d.setDate(d.getDate() + 1)) {
                dates.push(new Date(d).toISOString().split('T')[0]);
            }
            return dates;
        }

        function getWeeklyExpenses() {
            const weekDays = getWeekRange();
            return appState.transactions.filter(t => t.type === 'expense' && weekDays.includes(t.date) && t.status !== 'cancelled')
                .reduce((s, t) => s + Number(t.amount), 0);
        }

        function getWeeklyLimit() {
            const weekDays = getWeekRange();
            return weekDays.reduce((sum, d) => sum + (appState.dailyLimits[getDayType(d)] || 0), 0);
        }

        function showToast(msg, type = '') {
            const c = document.getElementById('toastContainer');
            const t = document.createElement('div');
            t.className = 'toast ' + type;
            t.textContent = msg;
            c.appendChild(t);
            setTimeout(() => { t.style.opacity = '0';
                t.style.transform = 'translateY(20px)';
                setTimeout(() => t.remove(), 300); }, 2500);
        }

        function celebrate() {
            const colors = ['#46C2CB', '#6D67E4', '#F2F7A1', '#EF4444', '#FFFFFF'];
            for (let i = 0; i < 30; i++) {
                const piece = document.createElement('div');
                piece.className = 'confetti-piece';
                piece.style.left = Math.random() * 100 + '%';
                piece.style.top = Math.random() * 50 + '%';
                piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                piece.style.animationDuration = (Math.random() * 1.5 + 1) + 's';
                document.body.appendChild(piece);
                setTimeout(() => piece.remove(), 2500);
            }
            showToast('🎉 Parabéns! Dentro do limite!', 'success');
        }

        function openModal(title, bodyHtml, onSave) {
            document.getElementById('modalContainer').innerHTML = `
        <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
          <div class="modal"><h3>${title}</h3><div id="modalBody">${bodyHtml}</div>
            <div class="modal-actions"><button class="btn btn-outline" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" id="modalSaveBtn">Salvar</button></div>
          </div></div>`;
            document.getElementById('modalSaveBtn').addEventListener('click', async () => { if (onSave) await onSave(); });
            lucide.createIcons();
            const modalEl = document.querySelector('.modal');
            if (modalEl) modalEl.scrollTop = 0;
        }

        function closeModal() { document.getElementById('modalContainer').innerHTML = ''; }

        function confirmDialog(msg, cb) { if (confirm(msg)) cb(); }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebarOverlay');
            if (sidebar.classList.contains('drawer-open')) { closeSidebar(); } else { sidebar.classList.add('drawer-open');
                overlay.classList.add('visible');
                document.body.style.overflow = 'hidden'; }
        }

        function closeSidebar() {
            document.getElementById('sidebar').classList.remove('drawer-open');
            document.getElementById('sidebarOverlay').classList.remove('visible');
            document.body.style.overflow = '';
        }

        function openQuickAddMenu() {
            if (isMobile()) {
                const body = `
          <div style="text-align:center;padding:10px 0;">
            <p style="margin-bottom:16px;">O que deseja adicionar?</p>
            <button class="btn btn-primary" style="width:100%;margin-bottom:8px;" id="quickAddExpense"><i data-lucide="arrow-up-circle"></i> Nova Despesa</button>
            <button class="btn btn-outline" style="width:100%;border-color:var(--income);color:var(--income);" id="quickAddIncome"><i data-lucide="arrow-down-circle"></i> Nova Receita</button>
          </div>`;
                openModal('Adicionar Rápido', body, () => closeModal());
                setTimeout(() => {
                    document.getElementById('quickAddExpense')?.addEventListener('click', () => { closeModal();
                        openTransactionModal('expense'); });
                    document.getElementById('quickAddIncome')?.addEventListener('click', () => { closeModal();
                        openTransactionModal('income'); });
                    lucide.createIcons();
                }, 100);
            } else openTransactionModal('expense');
        }

        async function toggleTheme() {
            appState.darkMode = !appState.darkMode;
            document.body.classList.toggle('light-mode', !appState.darkMode);
            await saveState();
            showToast('Tema atualizado');
            const meta = document.querySelector('meta[name="theme-color"]');
            if (meta) meta.content = appState.darkMode ? '#453C67' : '#F8FAFC';
            if (currentSection === 'dashboard' || currentSection === 'relatorios') setTimeout(renderCharts, 300);
        }

        // ====================
        // NAVIGATION
        // ====================
        let currentSection = 'dashboard';

        function navigate(section) {
            currentSection = section;
            if (isMobile()) closeSidebar();
            document.querySelectorAll('.sidebar nav a').forEach(a => a.classList.remove('active'));
            document.querySelector(`[data-nav="${section}"]`)?.classList.add('active');
            document.querySelectorAll('.bottom-nav button[data-bnav]').forEach(b => b.classList.remove('active'));
            document.querySelector(`[data-bnav="${section}"]`)?.classList.add('active');
            const titles = {
                dashboard: 'Visão Geral',
                receitas: 'Receitas',
                despesas: 'Despesas',
                contas: 'Contas',
                cartoes: 'Cartões',
                contasPagar: 'Contas a Pagar',
                transferencias: 'Transferências',
                orcamento: 'Orçamento',
                metas: 'Metas',
                calendario: 'Calendário',
                listaCompras: 'Lista de Compras',
                relatorios: 'Relatórios',
                configuracoes: 'Configurações'
            };
            document.getElementById('pageTitle').textContent = titles[section] || section;
            renderSection(section);
            lucide.createIcons();
            if (section === 'dashboard' || section === 'relatorios') setTimeout(renderCharts, 400);
            document.getElementById('contentArea').scrollTop = 0;
        }

        function renderSection(section) {
            const content = document.getElementById('contentArea');
            content.style.opacity = '0';
            content.style.transform = 'translateY(12px)';
            let html = '';
            switch (section) {
                case 'dashboard':
                    html = renderDashboard();
                    break;
                case 'receitas':
                    html = renderTransactionList('income');
                    break;
                case 'despesas':
                    html = renderTransactionList('expense');
                    break;
                case 'contas':
                    html = renderAccounts();
                    break;
                case 'cartoes':
                    html = renderCreditCards();
                    break;
                case 'contasPagar':
                    html = renderBills();
                    break;
                case 'transferencias':
                    html = renderTransfers();
                    break;
                case 'orcamento':
                    html = renderBudget();
                    break;
                case 'metas':
                    html = renderGoals();
                    break;
                case 'calendario':
                    html = renderCalendar();
                    break;
                case 'listaCompras':
                    html = renderShoppingLists();
                    break;
                case 'relatorios':
                    html = renderReports();
                    break;
                case 'configuracoes':
                    html = renderSettings();
                    break;
                default:
                    html = renderDashboard();
            }
            content.innerHTML = html;
            lucide.createIcons();
            requestAnimationFrame(() => {
                content.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
                content.style.opacity = '1';
                content.style.transform = 'translateY(0)';
                content.querySelectorAll('.card, .transaction-item, .shopping-category').forEach((el, i) => {
                    el.classList.add('animate-in');
                    el.style.animationDelay = `${i * 0.02}s`;
                });
            });
        }

        // ====================
        // DASHBOARD
        // ====================
        function renderDashboard() {
            const range = getMonthRange();
            const monthTrans = appState.transactions.filter(t => t.date >= range.start && t.date <= range.end && t.status !==
                'cancelled');
            const totalIncome = monthTrans.filter(t => t.type === 'income').reduce((s, t) => s + Number(t.amount), 0);
            const totalExpense = monthTrans.filter(t => t.type === 'expense').reduce((s, t) => s + Number(t.amount), 0);
            const balance = totalIncome - totalExpense;
            const totalBalance = appState.accounts.reduce((s, a) => s + Number(a.currentBalance || 0), 0);
            const recent = [...appState.transactions].sort((a, b) => b.date.localeCompare(a.date)).slice(0, 6);
            const todayExp = getTodayExpenses();
            const dailyLimit = getDailyLimit();
            const limitPct = dailyLimit > 0 ? Math.min(100, (todayExp / dailyLimit) * 100) : 0;
            const dayLabel = { weekday: 'Semana', saturday: 'Sábado', sunday: 'Domingo' } [getDayType(getTodayDate())];
            const weeklyExp = getWeeklyExpenses();
            const weeklyLimit = getWeeklyLimit();
            const weeklyPct = weeklyLimit > 0 ? Math.min(100, (weeklyExp / weeklyLimit) * 100) : 0;
            const monthlyBudget = appState.monthlyBudget || 0;
            const monthlyPct = monthlyBudget > 0 ? Math.min(100, (totalExpense / monthlyBudget) * 100) : 0;
            const expenseByCat = {};
            monthTrans.filter(t => t.type === 'expense').forEach(t => expenseByCat[t.category] = (expenseByCat[t.category] ||
                0) + Number(t.amount));
            const topCats = Object.entries(expenseByCat).sort((a, b) => b[1] - a[1]).slice(0, 6);
            if (dailyLimit > 0 && todayExp < dailyLimit) setTimeout(celebrate, 500);
            return `
        <div class="grid-cards">
          <div class="card"><div class="card-label"><i data-lucide="wallet" style="width:14px;"></i> Saldo total</div><div class="card-value">${formatMoney(totalBalance)}</div></div>
          <div class="card"><div class="card-label"><i data-lucide="arrow-down-circle" style="width:14px;"></i> Receitas do mês</div><div class="card-value income-text">${formatMoney(totalIncome)}</div></div>
          <div class="card"><div class="card-label"><i data-lucide="arrow-up-circle" style="width:14px;"></i> Despesas do mês</div><div class="card-value expense-text">${formatMoney(totalExpense)}</div></div>
          <div class="card"><div class="card-label"><i data-lucide="piggy-bank" style="width:14px;"></i> Economia</div><div class="card-value ${balance >= 0 ? 'income-text' : 'expense-text'}">${formatMoney(balance)}</div></div>
          <div class="card"><div class="card-label"><i data-lucide="gauge" style="width:14px;"></i> Limite diário (${dayLabel})</div><div class="card-value">${formatMoney(todayExp)} ${dailyLimit > 0 ? '/ ' + formatMoney(dailyLimit) : ''}</div>${dailyLimit > 0 ? `<div class="progress-bar"><div class="fill ${limitPct > 100 ? 'red' : 'accent'}" style="width:${limitPct}%"></div></div>` : ''}</div>
          <div class="card"><div class="card-label"><i data-lucide="calendar" style="width:14px;"></i> Limite semanal (7 dias)</div><div class="card-value">${formatMoney(weeklyExp)} ${weeklyLimit > 0 ? '/ ' + formatMoney(weeklyLimit) : ''}</div>${weeklyLimit > 0 ? `<div class="progress-bar"><div class="fill ${weeklyPct > 100 ? 'red' : 'accent'}" style="width:${weeklyPct}%"></div></div>` : '<p style="font-size:0.7em;color:var(--text-secondary);">Defina limites diários</p>'}</div>
          ${monthlyBudget > 0 ? `<div class="card"><div class="card-label"><i data-lucide="target" style="width:14px;"></i> Orçamento mensal</div><div class="card-value">${formatMoney(totalExpense)} / ${formatMoney(monthlyBudget)}</div><div class="progress-bar"><div class="fill ${monthlyPct > 100 ? 'red' : 'accent'}" style="width:${monthlyPct}%"></div></div></div>` : '<div class="card"><div class="card-label"><i data-lucide="target" style="width:14px;"></i> Orçamento mensal</div><p style="font-size:0.8em;">Não definido</p><button class="btn btn-outline btn-sm" onclick="navigate(\'configuracoes\')">Definir</button></div>'}
        </div>
        <div class="dashboard-two-col" style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px;">
          <div class="card"><div class="card-label">Fluxo financeiro</div><div style="position:relative;height:220px;"><canvas id="dashFlowChart"></canvas></div></div>
          <div class="card"><div class="card-label">Gastos por categoria</div>${topCats.map(([c, v]) => `<div style="display:flex;justify-content:space-between;padding:8px 0;font-size:0.8em;"><span>${c}</span><span style="font-weight:600;">${formatMoney(v)}</span></div>`).join('') || '<p style="color:var(--text-secondary);">Sem dados</p>'}</div>
        </div>
        <div class="card"><div class="card-label">Últimas movimentações</div>
          <div class="transaction-list">${recent.map(t => `
            <div class="transaction-item">
              <div class="transaction-icon">${t.type === 'income' ? '↓' : '↑'}</div>
              <div class="transaction-info"><div class="category">${t.category}</div><div class="meta">${formatDate(t.date)} · ${getAccountName(t.accountId)}</div></div>
              <div class="transaction-amount ${t.type === 'income' ? 'positive' : 'negative'}">${t.type === 'income' ? '+' : '-'}${formatMoney(t.amount)}</div>
            </div>`).join('') || '<p style="color:var(--text-secondary);padding:12px;">Nenhum lançamento</p>'}</div>
        </div>`;
        }

        function renderCharts() {
            const canvas = document.getElementById('dashFlowChart');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            if (canvas._chart) canvas._chart.destroy();
            const last6 = [];
            for (let i = 5; i >= 0; i--) {
                const d = new Date();
                d.setMonth(d.getMonth() - i);
                const y = d.getFullYear(),
                    m = d.getMonth();
                const ms = `${y}-${String(m+1).padStart(2,'0')}-01`;
                const me = new Date(y, m + 1, 0).toISOString().split('T')[0];
                const inc = appState.transactions.filter(t => t.type === 'income' && t.date >= ms && t.date <= me).reduce((s,
                    t) => s + Number(t.amount), 0);
                const exp = appState.transactions.filter(t => t.type === 'expense' && t.date >= ms && t.date <= me).reduce((s,
                    t) => s + Number(t.amount), 0);
                last6.push({ label: new Date(y, m).toLocaleDateString('pt-BR', { month: 'short' }), inc, exp });
            }
            canvas._chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: last6.map(l => l.label),
                    datasets: [
                        { label: 'Receitas', data: last6.map(l => l.inc), borderColor: '#46C2CB',
                            backgroundColor: 'transparent', tension: 0.4, pointRadius: 2, borderWidth: 2 },
                        { label: 'Despesas', data: last6.map(l => l.exp), borderColor: '#EF4444',
                            backgroundColor: 'transparent', tension: 0.4, pointRadius: 2, borderWidth: 2 }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { labels: { color: '#C4B8E0', font: { family: 'Inter', size: 11 },
                                usePointStyle: true, boxWidth: 8 } } },
                    scales: {
                        x: { ticks: { color: '#C4B8E0', font: { size: 10 } },
                            grid: { color: 'rgba(255,255,255,0.05)' } },
                        y: { ticks: { color: '#C4B8E0', font: { size: 10 } },
                            grid: { color: 'rgba(255,255,255,0.05)' } }
                    }
                }
            });
            if (currentSection === 'relatorios') {
                const rc = document.getElementById('reportBarChart');
                if (rc) {
                    if (rc._chart) rc._chart.destroy();
                    const expenseByCat = {};
                    appState.transactions.filter(t => t.type === 'expense').forEach(t => expenseByCat[t.category] = (expenseByCat[
                        t.category] || 0) + Number(t.amount));
                    const sorted = Object.entries(expenseByCat).sort((a, b) => b[1] - a[1]);
                    rc._chart = new Chart(rc, {
                        type: 'bar',
                        data: {
                            labels: sorted.map(([c]) => c),
                            datasets: [{ label: 'Despesas', data: sorted.map(([, v]) => v),
                                backgroundColor: 'rgba(109,103,228,0.6)', borderColor: '#6D67E4', borderWidth: 1,
                                borderRadius: 6 }
                            ]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: false,
                            indexAxis: sorted.length > 6 ? 'y' : 'x',
                            plugins: { legend: { labels: { color: '#C4B8E0', font: { family: 'Inter', size: 11 },
                                        usePointStyle: true } } },
                            scales: {
                                x: { ticks: { color: '#C4B8E0', font: { size: 10 } },
                                    grid: { color: 'rgba(255,255,255,0.05)' } },
                                y: { ticks: { color: '#C4B8E0', font: { size: 10 } },
                                    grid: { color: 'rgba(255,255,255,0.05)' } }
                            }
                        }
                    });
                }
            }
        }

        // ====================
        // LISTA DE COMPRAS
        // ====================
        function renderShoppingLists() {
            if (!appState.shoppingLists || appState.shoppingLists.length === 0) {
                appState.shoppingLists = JSON.parse(JSON.stringify(DEFAULT_SHOPPING_LISTS));
                saveState();
            }
            const list = appState.shoppingLists[0];
            let totalItems = 0;
            let checkedItems = 0;
            list.categories.forEach(cat => {
                totalItems += cat.items.length;
                checkedItems += (cat.checked || []).length;
            });
            const progressPct = totalItems > 0 ? Math.round((checkedItems / totalItems) * 100) : 0;
            let html = `
        <div style="margin-bottom:16px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;">
          <span style="font-weight:600;">Progresso: ${checkedItems}/${totalItems} itens (${progressPct}%)</span>
          <div class="progress-bar" style="flex:1;min-width:100px;"><div class="fill accent" style="width:${progressPct}%"></div></div>
          <button class="btn btn-outline btn-sm" onclick="resetShoppingList()"><i data-lucide="rotate-ccw" style="width:14px;"></i> Resetar</button>
          <button class="btn btn-primary btn-sm" onclick="openAddShoppingItemModal()"><i data-lucide="plus" style="width:14px;"></i> Novo Item</button>
        </div>`;
            list.categories.forEach((cat, catIndex) => {
                const checkedInCat = (cat.checked || []).length;
                const totalInCat = cat.items.length;
                html += `
        <div class="shopping-category">
          <div class="shopping-category-header" onclick="toggleShoppingCategory(this)" data-cat="${catIndex}">
            <span>${cat.name} <span style="font-size:0.75em;color:var(--text-secondary);">(${checkedInCat}/${totalInCat})</span></span>
            <i data-lucide="chevron-down" class="arrow" style="width:16px;"></i>
          </div>
          <div class="shopping-items" id="shoppingCat-${catIndex}">`;
                cat.items.forEach((item, itemIndex) => {
                    const isChecked = (cat.checked || []).includes(itemIndex);
                    html += `
            <div class="shopping-item${isChecked ? ' checked' : ''}" onclick="toggleShoppingItem(${catIndex}, ${itemIndex})">
              <input type="checkbox" ${isChecked ? 'checked' : ''} tabindex="-1">
              <span class="item-name">${item}</span>
              <button class="delete-item-btn" onclick="event.stopPropagation();deleteShoppingItem(${catIndex}, ${itemIndex})" title="Remover item">
                <i data-lucide="x" style="width:14px;"></i>
              </button>
            </div>`;
                });
                html += `</div></div>`;
            });
            return html;
        }

        function toggleShoppingCategory(header) {
            const catIndex = header.getAttribute('data-cat');
            const itemsDiv = document.getElementById('shoppingCat-' + catIndex);
            const arrow = header.querySelector('.arrow');
            if (itemsDiv.style.display === 'none') {
                itemsDiv.style.display = 'block';
                arrow.classList.add('open');
            } else {
                itemsDiv.style.display = 'none';
                arrow.classList.remove('open');
            }
        }

        async function toggleShoppingItem(catIndex, itemIndex) {
            const list = appState.shoppingLists[0];
            const cat = list.categories[catIndex];
            if (!cat.checked) cat.checked = [];
            const pos = cat.checked.indexOf(itemIndex);
            if (pos >= 0) {
                cat.checked.splice(pos, 1);
            } else {
                cat.checked.push(itemIndex);
            }
            await saveState();
            navigate('listaCompras');
        }

        async function deleteShoppingItem(catIndex, itemIndex) {
            const list = appState.shoppingLists[0];
            const cat = list.categories[catIndex];
            const itemName = cat.items[itemIndex];
            confirmDialog(`Remover "${itemName}" da lista?`, async () => {
                cat.items.splice(itemIndex, 1);
                if (!cat.checked) cat.checked = [];
                cat.checked = cat.checked.filter(i => i !== itemIndex).map(i => i > itemIndex ? i - 1 : i);
                await saveState();
                navigate('listaCompras');
                showToast('Item removido', 'error');
            });
        }

        async function resetShoppingList() {
            confirmDialog('Resetar toda a lista de compras?', async () => {
                appState.shoppingLists[0].categories.forEach(cat => { cat.checked = []; });
                await saveState();
                navigate('listaCompras');
                showToast('Lista resetada!', 'success');
            });
        }

        function openAddShoppingItemModal() {
            const list = appState.shoppingLists[0];
            const catOptions = list.categories.map((cat, i) =>
                `<option value="${i}">${cat.name}</option>`).join('');
            const body = `
        <div class="form-group"><label>Categoria</label><select id="addItemCat">${catOptions}</select></div>
        <div class="form-group"><label>Nome do Item</label><input type="text" id="addItemName" placeholder="Ex: Creme de leite"></div>`;
            openModal('Adicionar Item', body, async () => {
                const catIndex = parseInt(document.getElementById('addItemCat').value);
                const itemName = document.getElementById('addItemName').value.trim();
                if (!itemName) { showToast('Digite o nome do item', 'error'); return; }
                list.categories[catIndex].items.push(itemName);
                if (!list.categories[catIndex].checked) list.categories[catIndex].checked = [];
                await saveState();
                closeModal();
                navigate('listaCompras');
                showToast('Item adicionado!', 'success');
            });

        // ====================
        // CALENDAR
        // ====================
        function renderCalendar() { const now = new Date(); const y = now.getFullYear(),
                m = now.getMonth(); const days = new Date(y, m + 1, 0).getDate(),
                first = new Date(y, m, 1).getDay(); const today = now.getDate(); const all = {};
            appState.transactions.forEach(t => { if (!all[t.date]) all[t.date] = [];
                all[t.date].push(t); });
            appState.bills.forEach(b => { if (!all[b.dueDate]) all[b.dueDate] = [];
                all[b.dueDate].push({ type: 'bill', name: b.name, amount: b.amount }); }); let grid =
                '<div class="calendar-grid">';
            ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'].forEach(d => grid +=
                `<div class="day header">${d}</div>`); for (let i = 0; i < first; i++) grid += '<div class="day"></div>'; for (
                let d = 1; d <= days; d++) { const ds =
                `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; const has = all[ds] && all[ds].length >
                0;
                grid +=
                    `<div class="day${d===today?' today':''}${has?' has-event':''}" onclick="showDayDetails('${ds}')">${d}</div>`; }
            grid += '</div>'; return `<h3>${now.toLocaleDateString('pt-BR',{month:'long',year:'numeric'})}</h3>${grid}<div id="dayDetails" style="margin-top:16px;"></div>`; }

        function showDayDetails(ds) { const trans = appState.transactions.filter(t => t.date === ds),
                bills = appState.bills.filter(b => b.dueDate === ds); let h =
                `<h4>${formatDate(ds)}</h4>`; if (!trans.length && !bills.length) h += '<p>Sem movimentações</p>';
            trans.forEach(t => h +=
                `<div>${t.type==='income'?'Receita':'Despesa'} ${t.category}: ${formatMoney(t.amount)}</div>`);
            bills.forEach(b => h +=
                `<div>${b.name}: ${formatMoney(b.amount)} (${b.status==='paid'?'Pago':'Pendente'})</div>`);
            document.getElementById('dayDetails').innerHTML = h; }
