        // REPORTS
        // ====================
        function renderReports() { return `<div id="reportSection"><div class="grid-cards"><div class="card"><div class="card-label">Receitas totais</div><div class="card-value income-text">${formatMoney(appState.transactions.filter(t=>t.type==='income').reduce((s,t)=>s+Number(t.amount),0))}</div></div><div class="card"><div class="card-label">Despesas totais</div><div class="card-value expense-text">${formatMoney(appState.transactions.filter(t=>t.type==='expense').reduce((s,t)=>s+Number(t.amount),0))}</div></div></div><div class="card"><div class="card-label">Gastos por Categoria</div><div style="position:relative;height:260px;"><canvas id="reportBarChart"></canvas></div></div><div style="display:flex;gap:8px;margin-top:16px;"><button class="btn btn-outline" onclick="exportData('csv')">CSV</button><button class="btn btn-outline" onclick="exportData('json')">JSON</button><button class="btn btn-primary" onclick="exportPDF()">PDF</button></div></div>`; }

        function exportData(f) { if (f === 'csv') { let csv = 'Tipo,Valor,Categoria,Data\n';
                appState.transactions.forEach(t => csv += `${t.type},${t.amount},${t.category},${t.date}\n`);
                downloadBlob(csv, 'financehub.csv', 'text/csv'); } else { downloadBlob(JSON.stringify(appState),
                    'financehub_backup.json', 'application/json'); } }

        function downloadBlob(content, filename, mime) { const b = new Blob([content], { type: mime }); const a = document
                .createElement('a');
            a.href = URL.createObjectURL(b);
            a.download = filename;
            a.click(); }

        function exportPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            const range = getMonthRange();
            const monthTrans = appState.transactions.filter(t => t.date >= range.start && t.date <= range.end);
            const income = monthTrans.filter(t => t.type === 'income').reduce((s, t) => s + Number(t.amount), 0);
            const expense = monthTrans.filter(t => t.type === 'expense').reduce((s, t) => s + Number(t.amount), 0);
            const totalBalance = appState.accounts.reduce((s, a) => s + Number(a.currentBalance || 0), 0);
            doc.setFont('helvetica', 'bold');
            doc.setFontSize(18);
            doc.text('FinanceHub - Extrato', 20, 20);
            doc.setFontSize(10);
            doc.setFont('helvetica', 'normal');
            doc.text(`Data: ${new Date().toLocaleDateString('pt-BR')}`, 20, 28);
            doc.line(20, 32, 190, 32);
            doc.setFontSize(12);
            doc.setFont('helvetica', 'bold');
            doc.text('Resumo do Mês', 20, 42);
            doc.setFont('helvetica', 'normal');
            doc.text(`Receitas: ${formatMoney(income)}`, 20, 50);
            doc.text(`Despesas: ${formatMoney(expense)}`, 20, 58);
            doc.text(`Saldo do mês: ${formatMoney(income - expense)}`, 20, 66);
            doc.text(`Saldo total em contas: ${formatMoney(totalBalance)}`, 20, 74);
            doc.setFontSize(12);
            doc.setFont('helvetica', 'bold');
            doc.text('Últimas Movimentações', 20, 86);
            doc.setFont('helvetica', 'normal');
            doc.setFontSize(9);
            const recent = [...appState.transactions].sort((a, b) => b.date.localeCompare(a.date)).slice(0, 10);
            let y = 94;
            recent.forEach(t => {
                const sign = t.type === 'income' ? '+' : '-';
                doc.setTextColor(t.type === 'income' ? 0 : 200, t.type === 'income' ? 150 : 0, 0);
                doc.text(`${formatDate(t.date)} ${t.category}: ${sign}${formatMoney(t.amount)}`, 20, y);
                y += 6;
            });
            doc.save('extrato_financehub.pdf');
            showToast('PDF gerado!', 'success');
        }

        // ====================
        // SETTINGS
        // ====================
        function renderSettings() {
            const l = appState.dailyLimits;
            return `
        <div style="max-width:600px;margin:0 auto;" class="settings-card">
        <div class="card">
          <h3 style="margin-bottom:20px;">Configurações</h3>
          <div class="form-group"><label>Tema</label><select onchange="toggleTheme()"><option ${appState.darkMode?'selected':''}>Escuro</option><option ${!appState.darkMode?'selected':''}>Claro</option></select></div>
          <div class="form-group"><label>Alterar Senha</label><input type="password" id="newPin" placeholder="Nova senha" maxlength="6"></div>
          <button class="btn btn-primary" onclick="changePin()">Salvar Senha</button>
          <hr style="border-color:var(--border);margin:20px 0;">
          <h4>Limites Diários</h4>
          <div class="row-flex">
            <div class="form-group"><label>Semana</label><input type="number" id="limitWeekday" value="${l.weekday||0}"></div>
            <div class="form-group"><label>Sábado</label><input type="number" id="limitSaturday" value="${l.saturday||0}"></div>
            <div class="form-group"><label>Domingo</label><input type="number" id="limitSunday" value="${l.sunday||0}"></div>
          </div>
          <button class="btn btn-primary" onclick="saveDailyLimits()">Salvar Limites</button>
          <hr style="border-color:var(--border);margin:20px 0;">
          <h4>Orçamento Mensal</h4>
          <div class="form-group"><label>Valor Planejado</label><input type="number" id="monthlyBudgetInput" value="${appState.monthlyBudget||0}"></div>
          <button class="btn btn-primary" onclick="saveMonthlyBudget()">Salvar Orçamento</button>
          <hr style="border-color:var(--border);margin:20px 0;">
          <div class="form-group"><label>Categorias Despesas</label><textarea id="customExpCat">${appState.customCategories.expense.join(',')}</textarea></div>
          <div class="form-group"><label>Categorias Receitas</label><textarea id="customIncCat">${appState.customCategories.income.join(',')}</textarea></div>
          <button class="btn btn-primary" onclick="saveCategories()">Salvar Categorias</button>
          <button class="btn btn-danger" onclick="resetAll()" style="margin-top:20px;">Resetar Dados</button>
        </div>
      </div>`;
        }

        async function changePin() { const p = document.getElementById('newPin').value.trim(); if (p.length >= 3 && p.length <=
                6) {
                appState.pin = p;
                await saveState();
                showToast('Senha alterada'); } else showToast('Senha inválida', 'error'); }

        async function saveDailyLimits() { appState.dailyLimits = { weekday: +document.getElementById('limitWeekday').value || 0,
                saturday: +document.getElementById('limitSaturday').value || 0, sunday: +document.getElementById(
                    'limitSunday').value || 0 };
            await saveState();
            showToast('Limites salvos'); }

        async function saveMonthlyBudget() { appState.monthlyBudget = parseFloat(document.getElementById('monthlyBudgetInput')
                .value) ||
                0;
            await saveState();
            showToast('Orçamento salvo'); }

        async function saveCategories() { appState.customCategories.expense = document.getElementById('customExpCat').value.split(
                    ',')
                .map(s => s.trim()).filter(s => s);
            appState.customCategories.income = document.getElementById('customIncCat').value.split(',').map(s => s.trim())
                .filter(s => s);
            await saveState();
            showToast('Categorias salvas'); }

        async function resetAll() {
            confirmDialog('Resetar todos os dados (incluindo na nuvem)? Esta ação não pode ser desfeita.', async () => {
                try {
                    if (isOnline) {
                        updateSyncStatus('syncing', 'Limpando nuvem...', 'Del');
                        await FinanceAPI.clearAll();
                    }
                } catch (e) {
                    console.warn('Erro ao limpar nuvem:', e.message);
                }
                appState = {
                    pin: DEFAULT_PIN,
                    darkMode: appState.darkMode,
                    accounts: [],
                    transactions: [],
                    creditCards: [],
                    bills: [],
                    budgets: [],
                    goals: [],
                    transfers: [],
                    dailyLimits: { weekday: 0, saturday: 0, sunday: 0 },
                    monthlyBudget: 0,
                    shoppingLists: JSON.parse(JSON.stringify(DEFAULT_SHOPPING_LISTS)),
                    customCategories: {
                        expense: ['Moradia', 'Alimentação', 'Transporte', 'Saúde', 'Educação', 'Lazer', 'Compras',
                            'Assinaturas', 'Pets', 'Impostos', 'Outros'
                        ],
                        income: ['Salário', 'Freelance', 'Comissão', 'Venda', 'Presente', 'Outros']
                    }
                };
                await syncData();
                updateSyncStatus('saved', 'Dados resetados', 'OK');
                navigate('dashboard');
                showToast('Todos os dados foram resetados.', 'warning');
            });
        }

        // ====================
        // LOGIN / LOGOUT
        // ====================
        async function doLogin() {
            if (document.getElementById('loginPin').value === appState.pin) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('appScreen').style.display = 'flex';
                if (!appState.darkMode) document.body.classList.add('light-mode');
                updateSyncStatus('syncing', 'Carregando dados...', 'Load');
                await loadFromCloud();
                if (!appState.darkMode) document.body.classList.toggle('light-mode', !appState.darkMode);
                startAutoSync();
                navigate('dashboard');
                console.log('🚀 FinanceHub v2.8 · Cloud Sync · Pronto!');
            } else {
                showToast('Senha incorreta', 'error');
            }
        }

        function doLogout() {
            stopAutoSync();
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('appScreen').style.display = 'none';
            closeSidebar();
            updateSyncStatus('saved', 'Desconectado', 'OK');
        }

        // ====================
        // INIT
        // ====================
        async function initApp() {
            isOnline = typeof navigator !== 'undefined' ? navigator.onLine : true;
            updateSyncStatus(isOnline ? 'syncing' : 'offline', isOnline ? 'Iniciando...' : 'Offline', isOnline ? 'Init' :
                'Off');

            // Tentar carregar dados da nuvem
            const cloudLoaded = await loadFromCloud();

            if (!cloudLoaded && !isOnline) {
                console.log('🌐 Offline — usando dados padrão.');
            }

            // Garantir categorias
            if (!appState.customCategories) {
                appState.customCategories = {
                    expense: ['Moradia', 'Alimentação', 'Transporte', 'Saúde', 'Educação', 'Lazer', 'Compras',
                        'Assinaturas', 'Pets', 'Impostos', 'Outros'
                    ],
                    income: ['Salário', 'Freelance', 'Comissão', 'Venda', 'Presente', 'Outros']
                };
            }
            if (!appState.transfers) appState.transfers = [];
            if (!appState.budgets) appState.budgets = [];
            if (!appState.goals) appState.goals = [];
            if (!appState.dailyLimits) appState.dailyLimits = { weekday: 0, saturday: 0, sunday: 0 };
            if (appState.monthlyBudget === undefined) appState.monthlyBudget = 0;
            if (!appState.shoppingLists || appState.shoppingLists.length === 0) {
                appState.shoppingLists = JSON.parse(JSON.stringify(DEFAULT_SHOPPING_LISTS));
            }
            appState.shoppingLists.forEach(list => {
                list.categories.forEach(cat => {
                    if (!cat.checked) cat.checked = [];
                });
            });

            if (!appState.darkMode) document.body.classList.add('light-mode');

            updateSyncStatus(isOnline ? 'saved' : 'offline', isOnline ? 'Pronto' : 'Offline', isOnline ? 'OK' : 'Off');

            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('appScreen').style.display = 'none';
            document.getElementById('loginPin').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
            window.addEventListener('resize', () => { if (!isMobile()) closeSidebar(); });
            lucide.createIcons();

            console.log('🌐 FinanceHub Cloud Sync inicializado.');
            console.log('📡 API:', API_URL);
            console.log('🔌 Online:', isOnline);
        }

        // Iniciar o aplicativo
        initApp();
    </script>
</body>
</html>
