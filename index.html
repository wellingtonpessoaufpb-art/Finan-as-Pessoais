        // ==================== CALENDÁRIO ====================
        function renderCalendar() { const now = new Date(); const y = now.getFullYear(), m = now.getMonth(); const days = new Date(y, m + 1, 0).getDate(), first = new Date(y, m, 1).getDay(); const today = now.getDate(); const all = {};
            appState.transactions.forEach(t => { if (!all[t.date]) all[t.date] = []; all[t.date].push(t); });
            appState.bills.forEach(b => { if (!all[b.dueDate]) all[b.dueDate] = []; all[b.dueDate].push({ type: 'bill', name: b.name, amount: b.amount }); });
            let grid = '<div class="calendar-grid">';
            ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'].forEach(d => grid += `<div class="day header">${d}</div>`);
            for (let i = 0; i < first; i++) grid += '<div class="day"></div>';
            for (let d = 1; d <= days; d++) { const ds = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; const has = all[ds] && all[ds].length > 0; grid += `<div class="day${d===today?' today':''}${has?' has-event':''}" onclick="showDayDetails('${ds}')">${d}</div>`; }
            grid += '</div>'; return `<h3>${now.toLocaleDateString('pt-BR',{month:'long',year:'numeric'})}</h3>${grid}<div id="dayDetails" style="margin-top:16px;"></div>`; }

        function downloadBlob(content, filename, mime) { const b = new Blob([content], { type: mime }); const a = document.createElement('a'); a.href = URL.createObjectURL(b); a.download = filename; a.click(); }
        function exportPDF() { const { jsPDF } = window.jspdf; const doc = new jsPDF(); const range = getMonthRange(); const monthTrans = appState.transactions.filter(t => t.date >= range.start && t.date <= range.end); const income = monthTrans.filter(t => t.type === 'income').reduce((s, t) => s + Number(t.amount), 0); const expense = monthTrans.filter(t => t.type === 'expense').reduce((s, t) => s + Number(t.amount), 0); const totalBalance = appState.accounts.reduce((s, a) => s + Number(a.currentBalance || 0), 0); doc.setFont('helvetica', 'bold'); doc.setFontSize(18); doc.text('FinanceHub - Extrato', 20, 20); doc.setFontSize(10); doc.setFont('helvetica', 'normal'); doc.text(`Data: ${new Date().toLocaleDateString('pt-BR')}`, 20, 28); doc.line(20, 32, 190, 32); doc.setFontSize(12); doc.setFont('helvetica', 'bold'); doc.text('Resumo do Mês', 20, 42); doc.setFont('helvetica', 'normal'); doc.text(`Receitas: ${formatMoney(income)}`, 20, 50); doc.text(`Despesas: ${formatMoney(expense)}`, 20, 58); doc.text(`Saldo do mês: ${formatMoney(income - expense)}`, 20, 66); doc.text(`Saldo total em contas: ${formatMoney(totalBalance)}`, 20, 74); doc.setFontSize(12); doc.setFont('helvetica', 'bold'); doc.text('Últimas Movimentações', 20, 86); doc.setFont('helvetica', 'normal'); doc.setFontSize(9); const recent = [...appState.transactions].sort((a, b) => b.date.localeCompare(a.date)).slice(0, 10); let y = 94; recent.forEach(t => { const sign = t.type === 'income' ? '+' : '-'; doc.setTextColor(t.type === 'income' ? 0 : 200, t.type === 'income' ? 150 : 0, 0); doc.text(`${formatDate(t.date)} ${t.category}: ${sign}${formatMoney(t.amount)}`, 20, y); y += 6; }); doc.save('extrato_financehub.pdf'); showToast('PDF gerado!', 'success'); }

        function resetAll() { confirmDialog('Resetar tudo?', () => { localStorage.clear(); location.reload(); }); }

        // NOVO: funções para API da planilha
        function saveSheetApiUrl() {
            appState.sheetApiUrl = document.getElementById('sheetApiUrlInput').value.trim();
            saveState();
            showToast('URL da planilha salva!', 'success');
            if (appState.sheetApiUrl) syncToSheet();
        }
        function syncNow() {
            if (!appState.sheetApiUrl) { showToast('Configure a URL da planilha primeiro', 'error'); return; }
            syncToSheet();
            showToast('Sincronização enviada!', 'success');
        }

        // ==================== PLANEJAMENTO ====================
        function renderPlanejamento() {
            const plans = appState.plans || [];
            const groups = {};
            plans.forEach(p => { const cat = p.category || 'Geral'; if (!groups[cat]) groups[cat] = []; groups[cat].push(p); });
            let totalPrevisto = 0, totalGasto = 0;
            plans.forEach(p => { totalPrevisto += p.plannedAmount; totalGasto += (p.spentAmount || 0); });
            let html = `
            <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:20px;">
              <button class="btn btn-primary" onclick="openPlanModal()"><i data-lucide="plus"></i> Novo Item</button>
              <div style="font-size:0.9em;">
                <span>Previsto: <strong>${formatMoney(totalPrevisto)}</strong></span> ·
                <span>Gasto: <strong class="expense-text">${formatMoney(totalGasto)}</strong></span> ·
                <span>Saldo: <strong style="color:var(--income)">${formatMoney(totalPrevisto - totalGasto)}</strong></span>
              </div>
            </div>`;
            if (plans.length === 0) { html += '<p style="color:var(--text-secondary);">Nenhum item planejado. Adicione itens para começar.</p>'; return html; }
            for (const [cat, items] of Object.entries(groups)) {
                const catPrev = items.reduce((s, i) => s + i.plannedAmount, 0);
                const catGasto = items.reduce((s, i) => s + (i.spentAmount || 0), 0);
                html += `<div class="plan-group">
                  <div class="plan-group-header">
                    <span>${cat}</span>
                    <span style="font-size:0.8em;">Prev. ${formatMoney(catPrev)} · Gasto ${formatMoney(catGasto)} · Falta ${formatMoney(catPrev - catGasto)}</span>
                  </div>`;
                items.forEach(item => {
                    const status = item.status === 'paid' ? 'Pago ✅' : 'Falta Pagar ❌';
                    html += `
                  <div class="plan-item ${item.status === 'paid' ? 'checked' : ''}">
                    <input type="checkbox" ${item.status === 'paid' ? 'checked' : ''} onchange="togglePlanPaid('${item.id}', this.checked)" style="accent-color:var(--accent);">
                    <div class="plan-desc">${item.description || 'Sem descrição'}</div>
                    <div class="plan-amount">${formatMoney(item.plannedAmount)}</div>
                    <div class="plan-status">${item.spentAmount ? 'Gasto ' + formatMoney(item.spentAmount) : ''} ${status}</div>
                    <button class="btn btn-outline btn-sm" onclick="editPlanItem('${item.id}')"><i data-lucide="pencil" style="width:14px;"></i></button>
                    <button class="btn btn-danger btn-sm" onclick="deletePlanItem('${item.id}')"><i data-lucide="trash-2" style="width:14px;"></i></button>
                  </div>`;
                });
                html += `</div>`;
            }
            return html;
        }

        function openPlanModal(editId = null) {
            const existing = editId ? appState.plans.find(p => p.id === editId) : null;
            const cats = appState.customCategories.expense;
            const body = `
            <input type="hidden" id="planEditId" value="${editId || ''}">
            <div class="form-group"><label>Categoria</label><select id="planCategory">${cats.map(c => `<option ${existing && existing.category === c ? 'selected' : ''}>${c}</option>`).join('')}</select></div>
            <div class="form-group"><label>Descrição</label><input type="text" id="planDesc" value="${existing ? existing.description : ''}"></div>
            <div class="row-flex">
              <div class="form-group"><label>Valor Planejado</label><input type="number" id="planAmount" step="0.01" value="${existing ? existing.plannedAmount : ''}"></div>
              <div class="form-group"><label>Parcelas</label><input type="number" id="planParcelas" min="1" value="${existing ? (existing.totalParcelas || 1) : 1}"></div>
            </div>
            <p style="font-size:0.7em;color:var(--text-secondary);">Se parcelas > 1, serão criados vários itens com o mesmo valor.</p>`;
            openModal(existing ? 'Editar Item' : 'Novo Item', body, () => {
                const editIdVal = document.getElementById('planEditId').value;
                const cat = document.getElementById('planCategory').value;
                const desc = document.getElementById('planDesc').value.trim();
                const amt = parseFloat(document.getElementById('planAmount').value);
                const parcelas = parseInt(document.getElementById('planParcelas').value) || 1;
                if (!desc || !amt) { showToast('Preencha descrição e valor', 'error'); return; }
                if (editIdVal) {
                    const idx = appState.plans.findIndex(p => p.id === editIdVal);
                    if (idx >= 0) {
                        appState.plans[idx].category = cat;
                        appState.plans[idx].description = desc;
                        appState.plans[idx].plannedAmount = amt;
                    }
                } else {
                    for (let i = 1; i <= parcelas; i++) {
                        appState.plans.push({
                            id: generateId(),
                            category: cat,
                            description: parcelas > 1 ? `${desc} - Parcela ${i}` : desc,
                            plannedAmount: amt,
                            spentAmount: 0,
                            status: 'pending',
                            totalParcelas: parcelas,
                            createdAt: new Date().toISOString()
                        });
                    }
                }
                saveState();
                closeModal();
                navigate('planejamento');
                showToast('Item salvo!', 'success');
            });
        }

        function editPlanItem(id) { openPlanModal(id); }

        function deletePlanItem(id) {
            confirmDialog('Remover este item do planejamento?', () => {
                appState.plans = appState.plans.filter(p => p.id !== id);
                saveState();
                navigate('planejamento');
                showToast('Item removido', 'error');
            });
        }

        function togglePlanPaid(id, checked) {
            const plan = appState.plans.find(p => p.id === id);
            if (!plan) return;
            if (checked) {
                const body = `
                <p>Deseja lançar uma despesa real de <b>${formatMoney(plan.plannedAmount)}</b> (${plan.description})?</p>
                <div class="form-group"><label>Conta</label><select id="planPayAccount">${appState.accounts.map(a => `<option value="${a.id}">${a.name}</option>`).join('')}</select></div>
                <div class="form-group"><label>Data</label><input type="date" id="planPayDate" value="${getTodayDate()}"></div>
                <div class="form-group"><label><input type="checkbox" id="planExcludeLimit"> Excluir do limite diário</label></div>
                <p style="font-size:0.8em;">Deixe em branco e clique em "Salvar" apenas para marcar como pago sem lançar despesa.</p>`;
                openModal('Confirmar Pagamento', body, () => {
                    const accId = document.getElementById('planPayAccount')?.value;
                    const date = document.getElementById('planPayDate')?.value;
                    const exclude = document.getElementById('planExcludeLimit')?.checked;
                    plan.status = 'paid';
                    plan.spentAmount = plan.plannedAmount;
                    if (accId) {
                        const trans = {
                            id: generateId(),
                            type: 'expense',
                            amount: plan.plannedAmount,
                            category: plan.category,
                            subcategory: plan.description,
                            date: date,
                            accountId: accId,
                            description: 'Planejamento: ' + plan.description,
                            recurring: false,
                            cardId: null,
                            status: 'paid',
                            excludeFromDailyLimit: !!exclude
                        };
                        appState.transactions.push(trans);
                        const acc = appState.accounts.find(a => a.id === accId);
                        if (acc) acc.currentBalance -= plan.plannedAmount;
                        saveState();
                        closeModal();
                        navigate('planejamento');
                        showToast('Pago e despesa lançada!', 'success');
                    } else {
                        saveState();
                        closeModal();
                        navigate('planejamento');
                        showToast('Marcado como pago.', 'success');
                    }
                });
            } else {
                plan.status = 'pending';
                plan.spentAmount = 0;
                saveState();
                navigate('planejamento');
                showToast('Revertido para pendente.', 'warning');
            }
        }

        // ==================== LOGIN / LOGOUT ====================
        function doLogin() {
            if (document.getElementById('loginPin').value === appState.pin) {
                document.getElementById('loginScreen').style.display = 'none';
                document.getElementById('appScreen').style.display = 'flex';
                if (!appState.darkMode) document.body.classList.add('light-mode');
                navigate('dashboard');
            } else {
                showToast('Senha incorreta', 'error');
            }
        }

        function doLogout() {
            document.getElementById('loginScreen').style.display = 'flex';
            document.getElementById('appScreen').style.display = 'none';
            closeSidebar();
        }

        // INIT
        loadState();
        if (!appState.darkMode) document.body.classList.add('light-mode');
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('appScreen').style.display = 'none';
        document.getElementById('loginPin').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
        window.addEventListener('resize', () => { if (!isMobile()) closeSidebar(); });
        lucide.createIcons();
        console.log('🚀 FinanceHub v2.9 · Planilha + Limite inteligente · Pronto!');
    </script>
</body>
</html>
