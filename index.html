<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>FinanceHub · Gestão Financeira</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    :root {
      --bg: #453C67;
      --card: #3A3159;
      --card-secondary: #4B3F6B;
      --text: #FFFFFF;
      --text-secondary: #C4B8E0;
      --border: rgba(255, 255, 255, 0.08);
      --accent: #6D67E4;
      --accent-hover: #7B73F0;
      --income: #46C2CB;
      --expense: #EF4444;
      --warning: #F2F7A1;
      --info: #3B82F6;
      --radius: 20px;
      --radius-sm: 14px;
      --radius-xs: 10px;
      --transition: 250ms cubic-bezier(0.4, 0, 0.2, 1);
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2), 0 2px 4px -2px rgba(0, 0, 0, 0.2);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 4px 6px -4px rgba(0, 0, 0, 0.2);
      --sidebar-width: 260px;
      --header-height: 64px;
      --font: 'Inter', system-ui, -apple-system, sans-serif;
    }

    .light-mode {
      --bg: #F8FAFC;
      --card: #FFFFFF;
      --card-secondary: #F1F5F9;
      --text: #0F172A;
      --text-secondary: #64748B;
      --border: rgba(0, 0, 0, 0.06);
      --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -2px rgba(0, 0, 0, 0.05);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.08), 0 4px 6px -4px rgba(0, 0, 0, 0.04);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      display: flex;
      height: 100vh;
      overflow: hidden;
      transition: background var(--transition), color var(--transition);
      -webkit-font-smoothing: antialiased;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }

    /* Animations */
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes scaleIn { from { transform: scale(0.94); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    @keyframes confetti { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(-200px) rotate(720deg); opacity: 0; } }
    .animate-in { animation: fadeInUp 0.5s ease forwards; opacity: 0; }
    .confetti-piece {
      position: fixed; width: 10px; height: 10px; border-radius: 2px; z-index: 9999;
      animation: confetti 1.5s ease-out forwards; pointer-events: none;
    }

    .btn { position: relative; overflow: hidden; }
    .btn::after {
      content: ''; position: absolute; top: 50%; left: 50%; width: 5px; height: 5px;
      background: rgba(255,255,255,0.3); opacity: 0; border-radius: 100%;
      transform: scale(1,1) translate(-50%,-50%); transform-origin: 50% 50%;
    }
    .btn:active::after { animation: ripple 0.6s ease-out; }

    /* Sidebar */
    .sidebar {
      width: var(--sidebar-width); background: var(--card); display: flex;
      flex-direction: column; flex-shrink: 0; z-index: 100;
      border-right: 1px solid var(--border); transition: all var(--transition); overflow-y: auto;
    }
    .sidebar .logo {
      padding: 24px 20px 20px; font-weight: 600; font-size: 1.1em;
      color: var(--text); display: flex; align-items: center; gap: 8px; letter-spacing: -0.3px;
    }
    .sidebar .logo img { height: 44px; width: auto; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.3)); transition: transform 0.3s ease; }
    .sidebar .logo img:hover { transform: scale(1.05); }
    .sidebar nav { flex: 1; padding: 8px 0; }
    .sidebar nav a {
      display: flex; align-items: center; gap: 12px; padding: 10px 20px;
      margin: 2px 8px; color: var(--text-secondary); text-decoration: none;
      font-size: 0.83em; font-weight: 500; border-radius: 10px;
      transition: all var(--transition); cursor: pointer; position: relative;
    }
    .sidebar nav a i { stroke-width: 1.5; width: 20px; height: 20px; }
    .sidebar nav a:hover { background: rgba(255,255,255,0.04); color: var(--text); }
    .sidebar nav a.active {
      background: rgba(109,103,228,0.15); color: var(--accent); font-weight: 600;
    }
    .sidebar nav a.active::before {
      content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%);
      width: 3px; height: 20px; background: var(--accent); border-radius: 0 3px 3px 0;
    }
    .sidebar-footer {
      padding: 16px 20px; border-top: 1px solid var(--border);
      font-size: 0.72em; color: var(--text-secondary); display: flex; align-items: center; justify-content: space-between;
    }
    .sidebar-footer .theme-toggle {
      cursor: pointer; width: 36px; height: 36px; display: flex; align-items: center;
      justify-content: center; border-radius: 10px; background: transparent; border: none;
      color: var(--text-secondary); transition: all var(--transition);
    }
    .sidebar-footer .theme-toggle:hover { background: rgba(255,255,255,0.05); color: var(--text); }

    /* Main */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg); }
    .header {
      height: var(--header-height); background: var(--card); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between; padding: 0 28px; z-index: 50;
    }
    .header h2 { font-size: 1.1em; font-weight: 600; letter-spacing: -0.3px; display: flex; align-items: center; gap: 8px; }
    .header-actions { display: flex; gap: 8px; align-items: center; }
    .content { flex: 1; overflow-y: auto; padding: 28px; transition: opacity 0.3s ease, transform 0.3s ease; }

    /* Cards */
    .grid-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .card {
      background: var(--card); border-radius: var(--radius); padding: 20px 22px;
      border: 1px solid var(--border); transition: all var(--transition); position: relative; overflow: hidden;
    }
    .card:hover { border-color: rgba(255,255,255,0.15); box-shadow: var(--shadow); transform: translateY(-2px); }
    .card-label { font-size: 0.72em; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.8px; font-weight: 600; margin-bottom: 10px; display: flex; align-items: center; gap: 6px; }
    .card-value { font-size: 1.6em; font-weight: 700; letter-spacing: -0.5px; line-height: 1; }
    .income-text { color: var(--income); }
    .expense-text { color: var(--expense); }

    /* Buttons */
    .btn {
      padding: 8px 16px; border-radius: 50px; border: none; cursor: pointer; font-weight: 500;
      font-size: 0.8em; transition: all var(--transition); display: inline-flex; align-items: center;
      gap: 6px; font-family: var(--font); letter-spacing: 0.2px; background: transparent; color: var(--text);
    }
    .btn-primary { background: var(--accent); color: #FFFFFF; font-weight: 600; }
    .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(109,103,228,0.3); }
    .btn-danger { background: transparent; color: var(--expense); border: 1px solid rgba(239,68,68,0.3); }
    .btn-danger:hover { background: rgba(239,68,68,0.1); }
    .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-secondary); }
    .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
    .btn-sm { padding: 5px 12px; font-size: 0.72em; }

    /* Transaction list */
    .transaction-list { display: flex; flex-direction: column; gap: 6px; }
    .transaction-item {
      display: flex; align-items: center; padding: 14px 18px; background: var(--card);
      border-radius: var(--radius-sm); border: 1px solid transparent; transition: all var(--transition); gap: 14px;
    }
    .transaction-item:hover { border-color: var(--border); background: var(--card-secondary); transform: scale(1.01); }
    .transaction-icon {
      width: 40px; height: 40px; border-radius: 12px; background: var(--card-secondary);
      display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 0.8em;
    }
    .transaction-info { flex: 1; }
    .transaction-info .category { font-weight: 600; font-size: 0.85em; }
    .transaction-info .meta { font-size: 0.72em; color: var(--text-secondary); margin-top: 2px; }
    .transaction-amount { font-weight: 700; font-size: 0.9em; }
    .transaction-amount.positive { color: var(--income); }
    .transaction-amount.negative { color: var(--expense); }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
      z-index: 200; display: flex; align-items: center; justify-content: center; animation: fadeIn 0.2s ease;
    }
    .modal {
      background: var(--card); border-radius: var(--radius); padding: 32px; width: 90%;
      max-width: 500px; max-height: 85vh; overflow-y: auto; border: 1px solid var(--border);
      box-shadow: var(--shadow-lg); animation: scaleIn 0.2s ease;
    }
    .modal h3 { font-size: 1.1em; font-weight: 600; margin-bottom: 24px; }
    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block; font-weight: 500; font-size: 0.75em; margin-bottom: 6px;
      color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px;
    }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%; height: 48px; padding: 0 16px; border: 1px solid var(--border);
      border-radius: var(--radius-sm); font-size: 0.88em; background: var(--card-secondary);
      color: var(--text); font-family: var(--font); transition: all var(--transition); appearance: none;
    }
    .form-group textarea { height: auto; padding: 12px 16px; resize: vertical; }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(109,103,228,0.15);
    }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 28px; }
    .row-flex { display: flex; gap: 14px; }
    .row-flex > * { flex: 1; }

    /* Toast */
    .toast {
      position: fixed; bottom: 28px; right: 28px; padding: 14px 24px; border-radius: 50px;
      z-index: 999; font-weight: 500; font-size: 0.8em; animation: slideUp 0.3s ease;
      box-shadow: var(--shadow-lg); background: var(--card); border: 1px solid var(--border);
      color: var(--text); display: flex; align-items: center; gap: 8px;
    }
    .toast.success { border-left: 3px solid var(--income); }
    .toast.error { border-left: 3px solid var(--expense); }
    .toast.warning { border-left: 3px solid var(--warning); }

    /* Login */
    .login-container {
      display: flex; align-items: center; justify-content: center; height: 100vh; width: 100vw; background: var(--bg);
    }
    .login-box {
      background: var(--card); padding: 48px 40px; border-radius: var(--radius); width: 400px;
      max-width: 90%; border: 1px solid var(--border); box-shadow: var(--shadow-lg); text-align: center; animation: scaleIn 0.3s ease;
    }
    .login-box .login-logo { height: 80px; margin-bottom: 20px; filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4)); transition: transform 0.3s ease; }
    .login-box .login-logo:hover { transform: scale(1.05); }
    .login-box h1 { font-size: 1.4em; font-weight: 600; margin-bottom: 4px; }
    .login-box input {
      width: 100%; height: 52px; padding: 0 16px; margin: 12px 0; border: 1px solid var(--border);
      border-radius: var(--radius-sm); font-size: 1em; text-align: center; letter-spacing: 4px;
      font-weight: 500; font-family: var(--font); background: var(--card-secondary); color: var(--text);
    }

    /* Progress */
    .progress-bar { height: 4px; background: var(--border); border-radius: 10px; overflow: hidden; margin-top: 8px; }
    .progress-bar .fill { height: 100%; border-radius: 10px; transition: width 0.6s ease; }
    .fill.accent { background: var(--accent); }
    .fill.green { background: var(--income); }
    .fill.red { background: var(--expense); }

    /* Settings specific */
    .settings-card input,
    .settings-card select,
    .settings-card textarea {
      height: 48px; border-radius: var(--radius-sm); border: 1px solid var(--border);
      background: var(--card-secondary); color: var(--text); padding: 0 16px;
      font-family: var(--font); font-size: 0.88em; width: 100%; transition: all var(--transition);
    }
    .settings-card textarea { height: 80px; padding: 12px 16px; }
    .settings-card input:focus,
    .settings-card select:focus,
    .settings-card textarea:focus {
      outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(109,103,228,0.15);
    }

    @media (max-width: 768px) {
      .sidebar { width: 60px; }
      .sidebar .logo { justify-content: center; font-size: 0; }
      .sidebar .logo img { height: 32px; }
      .sidebar nav a { justify-content: center; padding: 12px; font-size: 0; gap: 0; }
      .sidebar nav a i { margin: 0 auto; }
      .grid-cards { grid-template-columns: repeat(2, 1fr); }
      :root { --sidebar-width: 60px; }
    }
  </style>
</head>
<body>
  <!-- Login Screen -->
  <div id="loginScreen" class="login-container">
    <div class="login-box">
      <img src="https://res.cloudinary.com/duu9q94cf/image/upload/quero-que-voc%C3%AA-crie-uma-logo--para-o-aplicativo-we_uzwrya.png" alt="FinanceHub Logo" class="login-logo">
      <h1>Finance<span style="color:var(--accent);">Hub</span></h1>
      <p style="color:var(--text-secondary); margin-bottom:20px;">Gestão financeira inteligente</p>
      <input type="password" id="loginPin" placeholder="Senha de acesso" maxlength="6" autofocus>
      <button class="btn btn-primary" onclick="doLogin()" style="width:100%;height:48px;justify-content:center;margin-top:8px;">Entrar</button>
      <p style="font-size:0.7em;color:var(--text-secondary);margin-top:16px;">Senha padrão: <strong style="color:var(--text);">1234</strong></p>
    </div>
  </div>

  <!-- App -->
  <div id="appScreen" style="display:none;width:100%;height:100vh;">
    <aside class="sidebar">
      <div class="logo">
        <img src="https://res.cloudinary.com/duu9q94cf/image/upload/quero-que-voc%C3%AA-crie-uma-logo--para-o-aplicativo-we_uzwrya.png" alt="FinanceHub">
        <span>FinanceHub</span>
      </div>
      <nav>
        <a onclick="navigate('dashboard')" class="active" data-nav="dashboard"><i data-lucide="layout-dashboard"></i> Dashboard</a>
        <a onclick="navigate('receitas')" data-nav="receitas"><i data-lucide="arrow-down-circle"></i> Receitas</a>
        <a onclick="navigate('despesas')" data-nav="despesas"><i data-lucide="arrow-up-circle"></i> Despesas</a>
        <a onclick="navigate('contas')" data-nav="contas"><i data-lucide="landmark"></i> Contas</a>
        <a onclick="navigate('cartoes')" data-nav="cartoes"><i data-lucide="credit-card"></i> Cartões</a>
        <a onclick="navigate('contasPagar')" data-nav="contasPagar"><i data-lucide="file-text"></i> Contas a Pagar</a>
        <a onclick="navigate('transferencias')" data-nav="transferencias"><i data-lucide="arrow-left-right"></i> Transferências</a>
        <a onclick="navigate('orcamento')" data-nav="orcamento"><i data-lucide="target"></i> Orçamento</a>
        <a onclick="navigate('metas')" data-nav="metas"><i data-lucide="flag"></i> Metas</a>
        <a onclick="navigate('calendario')" data-nav="calendario"><i data-lucide="calendar"></i> Calendário</a>
        <a onclick="navigate('relatorios')" data-nav="relatorios"><i data-lucide="bar-chart-3"></i> Relatórios</a>
        <a onclick="navigate('configuracoes')" data-nav="configuracoes"><i data-lucide="settings"></i> Configurações</a>
      </nav>
      <div class="sidebar-footer">
        <span>v2.4 · Final</span>
        <button class="theme-toggle" onclick="toggleTheme()" title="Alternar tema">
          <i data-lucide="sun-moon" style="width:18px;height:18px;"></i>
        </button>
      </div>
    </aside>

    <div class="main">
      <header class="header">
        <h2 id="pageTitle"></h2>
        <div class="header-actions">
          <button class="btn btn-outline btn-sm" onclick="navigate('configuracoes')"><i data-lucide="settings" style="width:14px;height:14px;"></i></button>
          <button class="btn btn-danger btn-sm" onclick="doLogout()">Sair</button>
        </div>
      </header>
      <div class="content" id="contentArea"></div>
    </div>
  </div>

  <div id="toastContainer"></div>
  <div id="modalContainer"></div>

  <script>
    // ==================== STATE & LOGIC ====================
    const DEFAULT_PIN = '1234';
    let appState = {
      pin: DEFAULT_PIN, darkMode: true, accounts: [], transactions: [], creditCards: [],
      bills: [], budgets: [], goals: [], transfers: [],
      dailyLimits: { weekday: 0, saturday: 0, sunday: 0 },
      customCategories: {
        expense: ['Moradia', 'Alimentação', 'Transporte', 'Saúde', 'Educação', 'Lazer', 'Compras', 'Assinaturas', 'Pets', 'Impostos', 'Outros'],
        income: ['Salário', 'Freelance', 'Comissão', 'Venda', 'Presente', 'Outros']
      }
    };

    function saveState() { localStorage.setItem('financehub_data', JSON.stringify(appState)); }
    function loadState() {
      const saved = localStorage.getItem('financehub_data');
      if (saved) {
        try {
          const parsed = JSON.parse(saved);
          appState = { ...appState, ...parsed };
          if (!appState.customCategories) appState.customCategories = {
            expense: ['Moradia', 'Alimentação', 'Transporte', 'Saúde', 'Educação', 'Lazer', 'Compras', 'Assinaturas', 'Pets', 'Impostos', 'Outros'],
            income: ['Salário', 'Freelance', 'Comissão', 'Venda', 'Presente', 'Outros']
          };
          if (!appState.transfers) appState.transfers = [];
          if (!appState.budgets) appState.budgets = [];
          if (!appState.goals) appState.goals = [];
          if (!appState.dailyLimits) appState.dailyLimits = { weekday: 0, saturday: 0, sunday: 0 };
        } catch (e) { console.warn("Erro ao carregar dados."); }
      }
    }

    function generateId() { return 'id_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6); }
    function formatMoney(val) { return 'R$ ' + Number(val).toFixed(2).replace('.', ',').replace(/\B(?=(\d{3})+(?!\d))/g, '.'); }
    function formatDate(d) { if (!d) return ''; return new Date(d + 'T00:00:00').toLocaleDateString('pt-BR', { timeZone: 'UTC' }); }
    function getMonthRange() { const n = new Date(); const s = new Date(n.getFullYear(), n.getMonth(), 1); const e = new Date(n.getFullYear(), n.getMonth() + 1, 0); return { start: s.toISOString().split('T')[0], end: e.toISOString().split('T')[0] }; }
    function getTodayDate() { return new Date().toISOString().split('T')[0]; }
    function getDayType(d) { const day = new Date(d + 'T00:00:00').getDay(); if (day === 0) return 'sunday'; if (day === 6) return 'saturday'; return 'weekday'; }
    function getDailyLimit() { return appState.dailyLimits[getDayType(getTodayDate())] || 0; }
    function getTodayExpenses() { return appState.transactions.filter(t => t.type === 'expense' && t.date === getTodayDate() && t.status !== 'cancelled').reduce((s, t) => s + Number(t.amount), 0); }
    function getAccountName(id) { const a = appState.accounts.find(x => x.id === id); return a ? a.name : '—'; }

    function showToast(msg, type = '') {
      const c = document.getElementById('toastContainer');
      const t = document.createElement('div');
      t.className = 'toast ' + type;
      t.textContent = msg;
      c.appendChild(t);
      setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateY(20px)'; setTimeout(() => t.remove(), 300); }, 2500);
    }

    function celebrate() {
      const colors = ['#46C2CB', '#6D67E4', '#F2F7A1', '#EF4444', '#FFFFFF'];
      for (let i = 0; i < 30; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.left = Math.random() * 100 + '%';
        piece.style.top = Math.random() * 50 + '%';
        piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDuration = (Math.random() * 1.5 + 1) + 's';
        document.body.appendChild(piece);
        setTimeout(() => piece.remove(), 2500);
      }
      showToast('🎉 Parabéns! Dentro do limite diário!', 'success');
    }

    function openModal(title, bodyHtml, onSave) {
      document.getElementById('modalContainer').innerHTML = `
        <div class="modal-overlay" onclick="if(event.target===this)closeModal()">
          <div class="modal"><h3>${title}</h3><div id="modalBody">${bodyHtml}</div>
            <div class="modal-actions"><button class="btn btn-outline" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" id="modalSaveBtn">Salvar</button></div>
          </div></div>`;
      document.getElementById('modalSaveBtn').addEventListener('click', () => { if (onSave) onSave(); });
      lucide.createIcons();
    }

    function closeModal() { document.getElementById('modalContainer').innerHTML = ''; }
    function confirmDialog(msg, cb) { if (confirm(msg)) cb(); }

    function toggleTheme() {
      appState.darkMode = !appState.darkMode;
      document.body.classList.toggle('light-mode', !appState.darkMode);
      saveState(); showToast('Tema atualizado');
    }

    // ==================== NAVIGATION ====================
    let currentSection = 'dashboard';
    function navigate(section) {
      currentSection = section;
      document.querySelectorAll('.sidebar nav a').forEach(a => a.classList.remove('active'));
      const nav = document.querySelector(`[data-nav="${section}"]`);
      if (nav) nav.classList.add('active');
      const titles = {
        dashboard: 'Visão Geral', receitas: 'Receitas', despesas: 'Despesas', contas: 'Contas', cartoes: 'Cartões',
        contasPagar: 'Contas a Pagar', transferencias: 'Transferências', orcamento: 'Orçamento', metas: 'Metas',
        calendario: 'Calendário', relatorios: 'Relatórios', configuracoes: 'Configurações'
      };
      document.getElementById('pageTitle').textContent = titles[section] || section;
      renderSection(section);
      lucide.createIcons();
      if (section === 'dashboard' || section === 'relatorios') setTimeout(renderCharts, 400);
    }

    function renderSection(section) {
      const content = document.getElementById('contentArea');
      content.style.opacity = '0'; content.style.transform = 'translateY(12px)';
      let html = '';
      switch (section) {
        case 'dashboard': html = renderDashboard(); break;
        case 'receitas': html = renderTransactionList('income'); break;
        case 'despesas': html = renderTransactionList('expense'); break;
        case 'contas': html = renderAccounts(); break;
        case 'cartoes': html = renderCreditCards(); break;
        case 'contasPagar': html = renderBills(); break;
        case 'transferencias': html = renderTransfers(); break;
        case 'orcamento': html = renderBudget(); break;
        case 'metas': html = renderGoals(); break;
        case 'calendario': html = renderCalendar(); break;
        case 'relatorios': html = renderReports(); break;
        case 'configuracoes': html = renderSettings(); break;
        default: html = renderDashboard();
      }
      content.innerHTML = html;
      lucide.createIcons();
      requestAnimationFrame(() => {
        content.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
        content.style.opacity = '1'; content.style.transform = 'translateY(0)';
        content.querySelectorAll('.card, .transaction-item').forEach((el, i) => {
          el.classList.add('animate-in'); el.style.animationDelay = `${i * 0.02}s`;
        });
      });
    }

    // ==================== DASHBOARD ====================
    function renderDashboard() {
      const range = getMonthRange();
      const monthTrans = appState.transactions.filter(t => t.date >= range.start && t.date <= range.end && t.status !== 'cancelled');
      const totalIncome = monthTrans.filter(t => t.type === 'income').reduce((s, t) => s + Number(t.amount), 0);
      const totalExpense = monthTrans.filter(t => t.type === 'expense').reduce((s, t) => s + Number(t.amount), 0);
      const balance = totalIncome - totalExpense;
      const totalBalance = appState.accounts.reduce((s, a) => s + Number(a.currentBalance || 0), 0);
      const recent = [...appState.transactions].sort((a, b) => b.date.localeCompare(a.date)).slice(0, 6);
      const todayExp = getTodayExpenses();
      const dailyLimit = getDailyLimit();
      const limitPct = dailyLimit > 0 ? Math.min(100, (todayExp / dailyLimit) * 100) : 0;
      const overLimit = dailyLimit > 0 && todayExp > dailyLimit;
      const underLimit = dailyLimit > 0 && todayExp < dailyLimit;
      const dayLabel = { weekday: 'Semana', saturday: 'Sábado', sunday: 'Domingo' }[getDayType(getTodayDate())];

      const expenseByCat = {};
      monthTrans.filter(t => t.type === 'expense').forEach(t => expenseByCat[t.category] = (expenseByCat[t.category] || 0) + Number(t.amount));
      const topCats = Object.entries(expenseByCat).sort((a, b) => b[1] - a[1]).slice(0, 6);

      if (underLimit) setTimeout(celebrate, 500);

      return `
        <div class="grid-cards">
          <div class="card"><div class="card-label"><i data-lucide="wallet" style="width:14px;"></i> Saldo total</div><div class="card-value">${formatMoney(totalBalance)}</div></div>
          <div class="card"><div class="card-label"><i data-lucide="arrow-down-circle" style="width:14px;"></i> Receitas do mês</div><div class="card-value income-text">${formatMoney(totalIncome)}</div></div>
          <div class="card"><div class="card-label"><i data-lucide="arrow-up-circle" style="width:14px;"></i> Despesas do mês</div><div class="card-value expense-text">${formatMoney(totalExpense)}</div></div>
          <div class="card"><div class="card-label"><i data-lucide="piggy-bank" style="width:14px;"></i> Economia</div><div class="card-value ${balance >= 0 ? 'income-text' : 'expense-text'}">${formatMoney(balance)}</div></div>
          <div class="card ${overLimit ? 'expense-text' : ''}"><div class="card-label"><i data-lucide="gauge" style="width:14px;"></i> Limite diário (${dayLabel})</div><div class="card-value">${formatMoney(todayExp)} ${dailyLimit > 0 ? '/ ' + formatMoney(dailyLimit) : ''}</div>${dailyLimit > 0 ? `<div class="progress-bar"><div class="fill ${limitPct > 100 ? 'red' : 'accent'}" style="width:${limitPct}%"></div></div>` : ''}</div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px;">
          <div class="card"><div class="card-label">Fluxo financeiro</div><canvas id="dashFlowChart" style="height:200px;"></canvas></div>
          <div class="card"><div class="card-label">Gastos por categoria</div>${topCats.map(([c, v]) => `<div style="display:flex;justify-content:space-between;padding:8px 0;font-size:0.8em;"><span>${c}</span><span style="font-weight:600;">${formatMoney(v)}</span></div>`).join('') || '<p style="color:var(--text-secondary);">Sem dados</p>'}</div>
        </div>
        <div class="card"><div class="card-label">Últimas movimentações</div>
          <div class="transaction-list">${recent.map(t => `
            <div class="transaction-item">
              <div class="transaction-icon">${t.type === 'income' ? '↓' : '↑'}</div>
              <div class="transaction-info"><div class="category">${t.category}</div><div class="meta">${formatDate(t.date)} · ${getAccountName(t.accountId)}</div></div>
              <div class="transaction-amount ${t.type === 'income' ? 'positive' : 'negative'}">${t.type === 'income' ? '+' : '-'}${formatMoney(t.amount)}</div>
            </div>`).join('') || '<p style="color:var(--text-secondary);padding:12px;">Nenhum lançamento</p>'}</div>
        </div>`;
    }

    function renderCharts() {
      const canvas = document.getElementById('dashFlowChart');
      if (!canvas) return;
      if (canvas._chart) canvas._chart.destroy();
      const last6 = [];
      for (let i = 5; i >= 0; i--) {
        const d = new Date(); d.setMonth(d.getMonth() - i);
        const y = d.getFullYear(), m = d.getMonth();
        const ms = `${y}-${String(m+1).padStart(2,'0')}-01`;
        const me = new Date(y, m+1, 0).toISOString().split('T')[0];
        const inc = appState.transactions.filter(t => t.type === 'income' && t.date >= ms && t.date <= me).reduce((s, t) => s + Number(t.amount), 0);
        const exp = appState.transactions.filter(t => t.type === 'expense' && t.date >= ms && t.date <= me).reduce((s, t) => s + Number(t.amount), 0);
        last6.push({ label: new Date(y, m).toLocaleDateString('pt-BR', { month: 'short' }), inc, exp });
      }
      canvas._chart = new Chart(canvas, {
        type: 'line', data: {
          labels: last6.map(l => l.label),
          datasets: [
            { label: 'Receitas', data: last6.map(l => l.inc), borderColor: '#46C2CB', backgroundColor: 'transparent', tension: 0.4, pointRadius: 2, borderWidth: 2 },
            { label: 'Despesas', data: last6.map(l => l.exp), borderColor: '#EF4444', backgroundColor: 'transparent', tension: 0.4, pointRadius: 2, borderWidth: 2 }
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { labels: { color: '#C4B8E0', font: { family: 'Inter' }, usePointStyle: true } } },
          scales: {
            x: { ticks: { color: '#C4B8E0' }, grid: { color: 'rgba(255,255,255,0.05)' } },
            y: { ticks: { color: '#C4B8E0' }, grid: { color: 'rgba(255,255,255,0.05)' } }
          }
        }
      });
    }

    // ==================== TRANSACTION LIST ====================
    function renderTransactionList(type) {
      const items = appState.transactions.filter(t => t.type === type).sort((a, b) => b.date.localeCompare(a.date));
      return `
        <div style="display:flex;gap:10px;margin-bottom:20px;">
          <button class="btn btn-primary" onclick="openTransactionModal('${type}')"><i data-lucide="plus" style="width:16px;"></i> Novo</button>
          <input type="text" placeholder="Buscar..." oninput="filterTransactions(this.value,'${type}')" style="background:var(--card);border:1px solid var(--border);border-radius:50px;padding:8px 16px;color:var(--text);width:200px;">
        </div>
        <div class="transaction-list" id="transList-${type}">${items.map(t => `
          <div class="transaction-item" data-search="${t.category} ${t.description||''}">
            <div class="transaction-icon">${type==='income'?'↓':'↑'}</div>
            <div class="transaction-info"><div class="category">${t.category} ${t.subcategory||''}</div><div class="meta">${formatDate(t.date)} · ${getAccountName(t.accountId)}</div></div>
            <div class="transaction-amount ${type==='income'?'positive':'negative'}">${formatMoney(t.amount)}</div>
            <div><button class="btn btn-outline btn-sm" onclick="editTransaction('${t.id}')"><i data-lucide="pencil" style="width:14px;"></i></button> <button class="btn btn-danger btn-sm" onclick="deleteTransaction('${t.id}')"><i data-lucide="trash-2" style="width:14px;"></i></button></div>
          </div>`).join('') || '<p style="color:var(--text-secondary);">Nenhum registro</p>'}</div>`;
    }

    function filterTransactions(query, type) {
      document.querySelectorAll(`#transList-${type} .transaction-item`).forEach(el => {
        el.style.display = (el.getAttribute('data-search') || '').toLowerCase().includes(query.toLowerCase()) ? '' : 'none';
      });
    }

    function openTransactionModal(type, editId = null) {
      const existing = editId ? appState.transactions.find(t => t.id === editId) : null;
      const cats = type === 'income' ? appState.customCategories.income : appState.customCategories.expense;
      const body = `<input type="hidden" id="modalEditId" value="${editId||''}"><input type="hidden" id="modalType" value="${type}">
        <div class="form-group"><label>Valor</label><input type="number" id="modalAmount" step="0.01" value="${existing?existing.amount:''}" required></div>
        <div class="row-flex"><div class="form-group"><label>Categoria</label><select id="modalCategory">${cats.map(c=>`<option ${existing&&existing.category===c?'selected':''}>${c}</option>`).join('')}</select></div><div class="form-group"><label>Subcategoria</label><input type="text" id="modalSubcategory" value="${existing?existing.subcategory||'':''}"></div></div>
        <div class="form-group"><label>Data</label><input type="date" id="modalDate" value="${existing?existing.date:getTodayDate()}"></div>
        <div class="form-group"><label>Conta</label><select id="modalAccount">${appState.accounts.map(a=>`<option value="${a.id}" ${existing&&existing.accountId===a.id?'selected':''}>${a.name}</option>`).join('')}</select></div>
        ${type==='expense'?`<div class="form-group"><label>Cartão</label><select id="modalCard"><option value="">Nenhum</option>${appState.creditCards.map(c=>`<option value="${c.id}" ${existing&&existing.cardId===c.id?'selected':''}>${c.name}</option>`).join('')}</select></div>`:''}
        <div class="form-group"><label>Descrição</label><input type="text" id="modalDescription" value="${existing?existing.description||'':''}"></div>
        <div class="form-group"><label><input type="checkbox" id="modalRecurring" ${existing&&existing.recurring?'checked':''}> Recorrente</label></div>`;
      openModal(type==='income'?'Receita':'Despesa', body, () => {
        const amt = parseFloat(document.getElementById('modalAmount').value);
        if (!amt || amt <= 0) { showToast('Valor inválido', 'error'); return; }
        const data = { id: editId || generateId(), type, amount: amt, category: document.getElementById('modalCategory').value, subcategory: document.getElementById('modalSubcategory').value, date: document.getElementById('modalDate').value, accountId: document.getElementById('modalAccount').value, description: document.getElementById('modalDescription').value, recurring: document.getElementById('modalRecurring').checked, cardId: type==='expense'?document.getElementById('modalCard')?.value||null:null, status:'paid' };
        if (editId) { const idx = appState.transactions.findIndex(t=>t.id===editId); if(idx>=0) appState.transactions[idx]=data; } else appState.transactions.push(data);
        saveState(); closeModal(); navigate(currentSection); showToast('Salvo', 'success');
        if (type === 'expense') {
          const todayExp = getTodayExpenses();
          const limit = getDailyLimit();
          if (limit > 0 && todayExp > limit) showToast('⚠️ Limite diário excedido!', 'warning');
          else if (limit > 0 && todayExp < limit) celebrate();
        }
      });
    }

    function editTransaction(id) { const t = appState.transactions.find(x=>x.id===id); if(t) openTransactionModal(t.type, id); }
    function deleteTransaction(id) { confirmDialog('Excluir?', ()=>{ appState.transactions = appState.transactions.filter(t=>t.id!==id); saveState(); navigate(currentSection); }); }

    // ==================== ACCOUNTS, CARDS, BILLS, TRANSFERS, BUDGET, GOALS, CALENDAR ====================
    function renderAccounts() { return `<button class="btn btn-primary" onclick="openAccountModal()" style="margin-bottom:20px;"><i data-lucide="plus"></i> Nova Conta</button><div class="grid-cards">${appState.accounts.map(a=>`<div class="card" style="border-left:3px solid ${a.color||'#6D67E4'}"><div class="card-label">${a.type||'Conta'}</div><div class="card-value" style="font-size:1.3em;">${formatMoney(a.currentBalance||0)}</div><div style="font-weight:600;">${a.name}</div><div style="margin-top:8px;"><button class="btn btn-outline btn-sm" onclick="editAccount('${a.id}')"><i data-lucide="pencil"></i></button> <button class="btn btn-danger btn-sm" onclick="deleteAccount('${a.id}')"><i data-lucide="trash-2"></i></button></div></div>`).join('')||'<p>Nenhuma conta</p>'}</div>`; }
    function openAccountModal(editId=null){ const e=editId?appState.accounts.find(a=>a.id===editId):null; const body=`<input type="hidden" id="accEditId" value="${editId||''}"><div class="form-group"><label>Nome</label><input type="text" id="accName" value="${e?e.name:''}"></div><div class="row-flex"><div class="form-group"><label>Tipo</label><select id="accType">${['Conta Corrente','Conta Poupança','Carteira','Dinheiro','Conta Digital'].map(t=>`<option ${e&&e.type===t?'selected':''}>${t}</option>`).join('')}</select></div><div class="form-group"><label>Banco</label><input type="text" id="accBank" value="${e?e.bank||'':''}"></div></div><div class="row-flex"><div class="form-group"><label>Saldo</label><input type="number" id="accBalance" value="${e?e.currentBalance:0}"></div><div class="form-group"><label>Cor</label><input type="color" id="accColor" value="${e?e.color||'#6D67E4':'#6D67E4'}"></div></div>`; openModal('Conta', body, ()=>{ const n=document.getElementById('accName').value.trim(); if(!n)return showToast('Nome obrigatório','error'); const d={id:editId||generateId(),name:n,type:document.getElementById('accType').value,bank:document.getElementById('accBank').value,currentBalance:parseFloat(document.getElementById('accBalance').value)||0,color:document.getElementById('accColor').value}; if(editId){const i=appState.accounts.findIndex(a=>a.id===editId);if(i>=0)appState.accounts[i]=d;}else appState.accounts.push(d); saveState();closeModal();navigate('contas'); }); }
    function editAccount(id){openAccountModal(id);}
    function deleteAccount(id){confirmDialog('Excluir?',()=>{appState.accounts=appState.accounts.filter(a=>a.id!==id);saveState();navigate('contas');});}

    function renderCreditCards(){ return `<button class="btn btn-primary" onclick="openCardModal()"><i data-lucide="plus"></i> Novo Cartão</button><div class="grid-cards">${appState.creditCards.map(c=>{const spent=appState.transactions.filter(t=>t.cardId===c.id&&t.type==='expense').reduce((s,t)=>s+Number(t.amount),0);return `<div class="card"><div class="card-label">${c.bank||'Cartão'}</div><div style="font-weight:700;">${c.name}</div><div>Limite ${formatMoney(c.limit||0)} · Disponível <span style="color:${(c.limit||0)-spent>0?'var(--income)':'var(--expense)'}">${formatMoney((c.limit||0)-spent)}</span></div><div style="margin-top:8px;"><button class="btn btn-outline btn-sm" onclick="editCard('${c.id}')"><i data-lucide="pencil"></i></button> <button class="btn btn-danger btn-sm" onclick="deleteCard('${c.id}')"><i data-lucide="trash-2"></i></button></div></div>`}).join('')||'<p>Nenhum cartão</p>'}</div>`; }
    function openCardModal(editId=null){ const e=editId?appState.creditCards.find(c=>c.id===editId):null; const body=`<input type="hidden" id="cardEditId" value="${editId||''}"><div class="form-group"><label>Nome</label><input type="text" id="cardName" value="${e?e.name:''}"></div><div class="row-flex"><div class="form-group"><label>Banco</label><input type="text" id="cardBank" value="${e?e.bank||'':''}"></div><div class="form-group"><label>Limite</label><input type="number" id="cardLimit" value="${e?e.limit:''}"></div></div><div class="row-flex"><div class="form-group"><label>Fechamento</label><input type="number" id="cardCloseDay" min="1" max="31" value="${e?e.closeDay||'':''}"></div><div class="form-group"><label>Vencimento</label><input type="number" id="cardDueDay" min="1" max="31" value="${e?e.dueDay||'':''}"></div></div>`; openModal('Cartão', body, ()=>{ const n=document.getElementById('cardName').value.trim(); if(!n)return; const d={id:editId||generateId(),name:n,bank:document.getElementById('cardBank').value,limit:parseFloat(document.getElementById('cardLimit').value)||0,closeDay:parseInt(document.getElementById('cardCloseDay').value)||null,dueDay:parseInt(document.getElementById('cardDueDay').value)||null}; if(editId){const i=appState.creditCards.findIndex(c=>c.id===editId);if(i>=0)appState.creditCards[i]=d;}else appState.creditCards.push(d); saveState();closeModal();navigate('cartoes'); }); }
    function editCard(id){openCardModal(id);}
    function deleteCard(id){confirmDialog('Excluir?',()=>{appState.creditCards=appState.creditCards.filter(c=>c.id!==id);saveState();navigate('cartoes');});}

    function renderBills(){ const bills=[...appState.bills].sort((a,b)=>a.dueDate.localeCompare(b.dueDate)); return `<button class="btn btn-primary" onclick="openBillModal()"><i data-lucide="plus"></i> Nova Conta</button><div class="transaction-list">${bills.map(b=>`<div class="transaction-item"><div class="transaction-icon">📅</div><div class="transaction-info"><div class="category">${b.name}</div><div class="meta">${formatDate(b.dueDate)}</div></div><div>${formatMoney(b.amount)}</div><span class="badge" style="margin-left:8px;background:${b.status==='paid'?'rgba(70,194,203,0.2)':(b.dueDate<getTodayDate()?'rgba(239,68,68,0.2)':'rgba(242,247,161,0.2)')};color:${b.status==='paid'?'var(--income)':(b.dueDate<getTodayDate()?'var(--expense)':'#F2F7A1')};padding:4px 10px;border-radius:20px;font-size:0.7em;">${b.status==='paid'?'Pago':(b.dueDate<getTodayDate()?'Vencida':'Pendente')}</span>${b.status==='pending'?`<button class="btn btn-primary btn-sm" onclick="payBill('${b.id}')" style="margin-left:8px;">Pagar</button>`:''}<button class="btn btn-outline btn-sm" onclick="editBill('${b.id}')"><i data-lucide="pencil"></i></button><button class="btn btn-danger btn-sm" onclick="deleteBill('${b.id}')"><i data-lucide="trash-2"></i></button></div>`).join('')||'<p>Nenhuma</p>'}</div>`; }
    function openBillModal(editId=null){ const e=editId?appState.bills.find(b=>b.id===editId):null; const body=`<input type="hidden" id="billEditId" value="${editId||''}"><div class="form-group"><label>Nome</label><input type="text" id="billName" value="${e?e.name:''}"></div><div class="row-flex"><div class="form-group"><label>Valor</label><input type="number" id="billAmount" value="${e?e.amount:''}"></div><div class="form-group"><label>Vencimento</label><input type="date" id="billDueDate" value="${e?e.dueDate:''}"></div></div>`; openModal('Conta a Pagar', body, ()=>{ const n=document.getElementById('billName').value.trim(); if(!n)return; const d={id:editId||generateId(),name:n,amount:parseFloat(document.getElementById('billAmount').value)||0,dueDate:document.getElementById('billDueDate').value,status:e?e.status:'pending'}; if(editId){const i=appState.bills.findIndex(b=>b.id===editId);if(i>=0)appState.bills[i]=d;}else appState.bills.push(d); saveState();closeModal();navigate('contasPagar'); }); }
    function payBill(id){ const bill=appState.bills.find(b=>b.id===id); if(!bill||bill.status==='paid')return; const body=`<p>Pagar <b>${bill.name}</b> - ${formatMoney(bill.amount)}</p><div class="form-group"><label>Conta</label><select id="payAccount">${appState.accounts.map(a=>`<option>${a.id}</option>`).join('')}</select></div><div class="form-group"><label>Data</label><input type="date" id="payDate" value="${getTodayDate()}"></div>`; openModal('Pagamento', body, ()=>{ const accId=document.getElementById('payAccount').value; bill.status='paid'; appState.transactions.push({id:generateId(),type:'expense',amount:bill.amount,category:'Contas',subcategory:bill.name,date:document.getElementById('payDate').value,accountId:accId,description:'Pagamento: '+bill.name,recurring:false,cardId:null,status:'paid'}); const acc=appState.accounts.find(a=>a.id===accId); if(acc) acc.currentBalance-=bill.amount; saveState();closeModal();navigate('contasPagar'); }); }
    function editBill(id){openBillModal(id);}
    function deleteBill(id){confirmDialog('Excluir?',()=>{appState.bills=appState.bills.filter(b=>b.id!==id);saveState();navigate('contasPagar');});}

    function renderTransfers(){ return `<button class="btn btn-primary" onclick="openTransferModal()"><i data-lucide="plus"></i> Nova</button><div class="transaction-list">${[...appState.transfers].sort((a,b)=>b.date.localeCompare(a.date)).map(t=>`<div class="transaction-item"><div class="transaction-icon">↔</div><div class="transaction-info"><div class="category">${getAccountName(t.fromAccountId)} → ${getAccountName(t.toAccountId)}</div><div class="meta">${formatDate(t.date)}</div></div><div>${formatMoney(t.amount)}</div><button class="btn btn-danger btn-sm" onclick="deleteTransfer('${t.id}')"><i data-lucide="trash-2"></i></button></div>`).join('')||'<p>Nenhuma</p>'}</div>`; }
    function openTransferModal(){ if(appState.accounts.length<2){showToast('Cadastre 2 contas','error');return;} const opts=appState.accounts.map(a=>`<option value="${a.id}">${a.name}</option>`).join(''); const body=`<div class="row-flex"><div class="form-group"><label>Origem</label><select id="tfFrom">${opts}</select></div><div class="form-group"><label>Destino</label><select id="tfTo">${opts}</select></div></div><div class="row-flex"><div class="form-group"><label>Valor</label><input type="number" id="tfAmount"></div><div class="form-group"><label>Data</label><input type="date" id="tfDate" value="${getTodayDate()}"></div></div>`; openModal('Transferência', body, ()=>{ const from=document.getElementById('tfFrom').value,to=document.getElementById('tfTo').value,amt=parseFloat(document.getElementById('tfAmount').value); if(from===to||!amt)return; const fa=appState.accounts.find(a=>a.id===from),ta=appState.accounts.find(a=>a.id===to); if(fa.currentBalance<amt)return showToast('Saldo insuficiente','error'); fa.currentBalance-=amt; ta.currentBalance+=amt; appState.transfers.push({id:generateId(),fromAccountId:from,toAccountId:to,amount:amt,date:document.getElementById('tfDate').value}); saveState();closeModal();navigate('transferencias'); }); }
    function deleteTransfer(id){confirmDialog('Excluir?',()=>{appState.transfers=appState.transfers.filter(t=>t.id!==id);saveState();navigate('transferencias');});}

    function renderBudget(){ const range=getMonthRange(); const monthExp=appState.transactions.filter(t=>t.type==='expense'&&t.date>=range.start&&t.date<=range.end); return `<button class="btn btn-primary" onclick="openBudgetModal()"><i data-lucide="plus"></i> Novo</button><div class="grid-cards">${appState.budgets.map(b=>{const spent=monthExp.filter(t=>t.category===b.category).reduce((s,t)=>s+Number(t.amount),0);const pct=Math.min(100,(spent/b.plannedAmount)*100)||0;return `<div class="card"><div class="card-label">${b.category}</div><div>Planejado ${formatMoney(b.plannedAmount)}</div><div>Gasto <span class="expense-text">${formatMoney(spent)}</span></div><div class="progress-bar"><div class="fill ${pct>100?'red':'accent'}" style="width:${pct}%"></div></div><button class="btn btn-danger btn-sm" onclick="deleteBudget('${b.id}')">Remover</button></div>`}).join('')||'<p>Nenhum</p>'}</div>`; }
    function openBudgetModal(){ const cats=appState.customCategories.expense; const body=`<div class="form-group"><label>Categoria</label><select id="budCat">${cats.map(c=>`<option>${c}</option>`).join('')}</select></div><div class="form-group"><label>Valor</label><input type="number" id="budAmount">`; openModal('Orçamento', body, ()=>{ const cat=document.getElementById('budCat').value,amt=parseFloat(document.getElementById('budAmount').value); if(!amt)return; const ex=appState.budgets.find(b=>b.category===cat); if(ex)ex.plannedAmount=amt; else appState.budgets.push({id:generateId(),category:cat,plannedAmount:amt}); saveState();closeModal();navigate('orcamento'); }); }
    function deleteBudget(id){ appState.budgets=appState.budgets.filter(b=>b.id!==id); saveState(); navigate('orcamento'); }

    function renderGoals(){ return `<button class="btn btn-primary" onclick="openGoalModal()"><i data-lucide="plus"></i> Nova Meta</button><div class="grid-cards">${appState.goals.map(g=>{const pct=Math.min(100,(g.savedAmount/g.targetAmount)*100)||0;return `<div class="card"><div class="card-label">${g.name}</div><div>Meta ${formatMoney(g.targetAmount)}</div><div>Salvo ${formatMoney(g.savedAmount)}</div><div class="progress-bar"><div class="fill accent" style="width:${pct}%"></div></div><button class="btn btn-outline btn-sm" onclick="addToGoal('${g.id}')">Adicionar</button><button class="btn btn-danger btn-sm" onclick="deleteGoal('${g.id}')">Excluir</button></div>`}).join('')||'<p>Nenhuma</p>'}</div>`; }
    function openGoalModal(){ const body=`<div class="form-group"><label>Nome</label><input type="text" id="goalName"></div><div class="row-flex"><div class="form-group"><label>Valor</label><input type="number" id="goalTarget"></div><div class="form-group"><label>Prazo</label><input type="date" id="goalDeadline"></div></div>`; openModal('Meta', body, ()=>{ const n=document.getElementById('goalName').value.trim(),t=parseFloat(document.getElementById('goalTarget').value); if(!n||!t)return; appState.goals.push({id:generateId(),name:n,targetAmount:t,savedAmount:0,deadline:document.getElementById('goalDeadline').value}); saveState();closeModal();navigate('metas'); }); }
    function addToGoal(id){ const g=appState.goals.find(x=>x.id===id); if(!g)return; const body=`<div class="form-group"><label>Valor</label><input type="number" id="addGoalAmount"></div>`; openModal('Adicionar', body, ()=>{ const amt=parseFloat(document.getElementById('addGoalAmount').value); if(!amt)return; g.savedAmount+=amt; saveState();closeModal();navigate('metas'); if(g.savedAmount>=g.targetAmount)showToast('Meta alcançada!','success'); }); }
    function deleteGoal(id){ confirmDialog('Excluir?',()=>{appState.goals=appState.goals.filter(g=>g.id!==id);saveState();navigate('metas');}); }

    function renderCalendar(){ const now=new Date(); const y=now.getFullYear(),m=now.getMonth(); const days=new Date(y,m+1,0).getDate(),first=new Date(y,m,1).getDay(); const today=now.getDate(); const all={}; appState.transactions.forEach(t=>{if(!all[t.date])all[t.date]=[];all[t.date].push(t);}); appState.bills.forEach(b=>{if(!all[b.dueDate])all[b.dueDate]=[];all[b.dueDate].push({type:'bill',name:b.name,amount:b.amount});}); let grid='<div class="calendar-grid">'; ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'].forEach(d=>grid+=`<div class="day header">${d}</div>`); for(let i=0;i<first;i++)grid+='<div class="day"></div>'; for(let d=1;d<=days;d++){const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;const has=all[ds]&&all[ds].length>0;grid+=`<div class="day${d===today?' today':''}${has?' has-event':''}" onclick="showDayDetails('${ds}')">${d}</div>`;} grid+='</div>'; return `<h3>${now.toLocaleDateString('pt-BR',{month:'long',year:'numeric'})}</h3>${grid}<div id="dayDetails" style="margin-top:16px;"></div>`; }
    function showDayDetails(ds){ const trans=appState.transactions.filter(t=>t.date===ds),bills=appState.bills.filter(b=>b.dueDate===ds); let h=`<h4>${formatDate(ds)}</h4>`; if(!trans.length&&!bills.length)h+='<p>Sem movimentações</p>'; trans.forEach(t=>h+=`<div>${t.type==='income'?'Receita':'Despesa'} ${t.category}: ${formatMoney(t.amount)}</div>`); bills.forEach(b=>h+=`<div>${b.name}: ${formatMoney(b.amount)} (${b.status==='paid'?'Pago':'Pendente'})</div>`); document.getElementById('dayDetails').innerHTML=h; }

    // ==================== REPORTS (com PDF) ====================
    function renderReports(){ return `<div id="reportSection"><div class="grid-cards"><div class="card"><div class="card-label">Receitas totais</div><div class="card-value income-text">${formatMoney(appState.transactions.filter(t=>t.type==='income').reduce((s,t)=>s+Number(t.amount),0))}</div></div><div class="card"><div class="card-label">Despesas totais</div><div class="card-value expense-text">${formatMoney(appState.transactions.filter(t=>t.type==='expense').reduce((s,t)=>s+Number(t.amount),0))}</div></div></div><canvas id="reportBarChart"></canvas><div style="display:flex;gap:10px;margin-top:16px;"><button class="btn btn-outline" onclick="exportData('csv')">CSV</button><button class="btn btn-outline" onclick="exportData('json')">JSON</button><button class="btn btn-primary" onclick="exportPDF()">Baixar PDF</button></div></div>`; }
    function exportData(f){ if(f==='csv'){let csv='Tipo,Valor,Categoria,Data\n';appState.transactions.forEach(t=>csv+=`${t.type},${t.amount},${t.category},${t.date}\n`);downloadBlob(csv,'financehub.csv','text/csv');}else{downloadBlob(JSON.stringify(appState),'financehub_backup.json','application/json');} }
    function downloadBlob(content, filename, mime){ const b=new Blob([content],{type:mime}); const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download=filename; a.click(); }

    function exportPDF() {
      const { jsPDF } = window.jspdf;
      const doc = new jsPDF();
      const range = getMonthRange();
      const monthTrans = appState.transactions.filter(t => t.date >= range.start && t.date <= range.end);
      const income = monthTrans.filter(t => t.type === 'income').reduce((s, t) => s + Number(t.amount), 0);
      const expense = monthTrans.filter(t => t.type === 'expense').reduce((s, t) => s + Number(t.amount), 0);
      const totalBalance = appState.accounts.reduce((s, a) => s + Number(a.currentBalance || 0), 0);

      doc.setFont('helvetica', 'bold');
      doc.setFontSize(18);
      doc.text('FinanceHub - Extrato', 20, 20);
      doc.setFontSize(10);
      doc.setFont('helvetica', 'normal');
      doc.text(`Data: ${new Date().toLocaleDateString('pt-BR')}`, 20, 28);
      doc.line(20, 32, 190, 32);
      
      doc.setFontSize(12);
      doc.setFont('helvetica', 'bold');
      doc.text('Resumo do Mês', 20, 42);
      doc.setFont('helvetica', 'normal');
      doc.text(`Receitas: ${formatMoney(income)}`, 20, 50);
      doc.text(`Despesas: ${formatMoney(expense)}`, 20, 58);
      doc.text(`Saldo do mês: ${formatMoney(income - expense)}`, 20, 66);
      doc.text(`Saldo total em contas: ${formatMoney(totalBalance)}`, 20, 74);
      
      doc.setFontSize(12);
      doc.setFont('helvetica', 'bold');
      doc.text('Últimas Movimentações', 20, 86);
      doc.setFont('helvetica', 'normal');
      doc.setFontSize(9);
      const recent = [...appState.transactions].sort((a, b) => b.date.localeCompare(a.date)).slice(0, 10);
      let y = 94;
      recent.forEach(t => {
        const sign = t.type === 'income' ? '+' : '-';
        const color = t.type === 'income' ? [0, 150, 0] : [200, 0, 0];
        doc.setTextColor(...color);
        doc.text(`${formatDate(t.date)} ${t.category}: ${sign}${formatMoney(t.amount)}`, 20, y);
        y += 6;
      });
      doc.save('extrato_financehub.pdf');
      showToast('PDF gerado com sucesso!', 'success');
    }

    // ==================== SETTINGS ====================
    function renderSettings() {
      const l = appState.dailyLimits;
      return `
      <div style="max-width:600px;margin:0 auto;" class="settings-card">
        <div class="card">
          <h3 style="margin-bottom:20px;">Configurações</h3>
          <div class="form-group"><label>Tema</label><select onchange="toggleTheme()"><option ${appState.darkMode?'selected':''}>Escuro</option><option ${!appState.darkMode?'selected':''}>Claro</option></select></div>
          <div class="form-group"><label>Alterar Senha</label><input type="password" id="newPin" placeholder="Nova senha (4-6 dígitos)"></div>
          <button class="btn btn-primary" onclick="changePin()">Salvar Senha</button>
          <hr style="border-color:var(--border);margin:20px 0;">
          <h4>Limites Diários</h4>
          <div class="row-flex">
            <div class="form-group"><label>Semana</label><input type="number" id="limitWeekday" value="${l.weekday||0}" placeholder="0"></div>
            <div class="form-group"><label>Sábado</label><input type="number" id="limitSaturday" value="${l.saturday||0}" placeholder="0"></div>
            <div class="form-group"><label>Domingo</label><input type="number" id="limitSunday" value="${l.sunday||0}" placeholder="0"></div>
          </div>
          <button class="btn btn-primary" onclick="saveDailyLimits()">Salvar Limites</button>
          <hr style="border-color:var(--border);margin:20px 0;">
          <div class="form-group"><label>Categorias Despesas</label><textarea id="customExpCat">${appState.customCategories.expense.join(',')}</textarea></div>
          <div class="form-group"><label>Categorias Receitas</label><textarea id="customIncCat">${appState.customCategories.income.join(',')}</textarea></div>
          <button class="btn btn-primary" onclick="saveCategories()">Salvar Categorias</button>
          <button class="btn btn-danger" onclick="resetAll()" style="margin-top:20px;">Resetar Dados</button>
        </div>
      </div>`;
    }

    function changePin(){ const p=document.getElementById('newPin').value.trim(); if(p.length>=3&&p.length<=6){appState.pin=p;saveState();showToast('Senha alterada');}else showToast('Senha inválida','error'); }
    function saveDailyLimits(){ appState.dailyLimits={weekday:+document.getElementById('limitWeekday').value||0,saturday:+document.getElementById('limitSaturday').value||0,sunday:+document.getElementById('limitSunday').value||0}; saveState();showToast('Limites salvos'); }
    function saveCategories(){ appState.customCategories.expense=document.getElementById('customExpCat').value.split(',').map(s=>s.trim()).filter(s=>s); appState.customCategories.income=document.getElementById('customIncCat').value.split(',').map(s=>s.trim()).filter(s=>s); saveState();showToast('Categorias salvas'); }
    function resetAll(){ confirmDialog('Resetar tudo?',()=>{localStorage.clear();location.reload();}); }

    // ==================== LOGIN ====================
    function doLogin(){ if(document.getElementById('loginPin').value===appState.pin){ document.getElementById('loginScreen').style.display='none'; document.getElementById('appScreen').style.display='flex'; if(!appState.darkMode)document.body.classList.add('light-mode'); navigate('dashboard'); }else showToast('Senha incorreta','error'); }
    function doLogout(){ document.getElementById('loginScreen').style.display='flex'; document.getElementById('appScreen').style.display='none'; }

    // INIT
    loadState();
    if(!appState.darkMode) document.body.classList.add('light-mode');
    document.getElementById('loginScreen').style.display='flex';
    document.getElementById('loginPin').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
    lucide.createIcons();
  </script>
</body>
</html>
